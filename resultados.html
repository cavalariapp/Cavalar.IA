<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Resultados de Provas — Cavalar.IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
/* ===========================
   BRAND TOKENS
=========================== */
:root {
  --bg:          #080d18;
  --surface:     #0f1623;
  --surface2:    #141e2e;
  --fg:          #ffffff;
  --muted:       #7a8ba8;
  --border:      #1c2840;
  --accent:      #e84d0e;
  --accent-dim:  rgba(232,77,14,.13);
  --accent-glow: rgba(232,77,14,.28);
  --green:       #22c55e;
  --font-display:'Barlow Condensed','Impact','Arial Narrow',Arial,sans-serif;
  --font-body:   -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ===========================
   LAYOUT SHELL
=========================== */
.page {
  max-width: 700px;
  margin: 0 auto;
  padding-bottom: 60px;
}

/* ===========================
   TOP BAR
=========================== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 58px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.logo-img {
  height: 32px;
  width: auto;
  max-width: 200px;
  display: block;
}
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 4px 0;
  text-decoration: none;
  transition: color .18s;
}
.btn-back:hover { color: var(--fg); }
.btn-back svg { width: 16px; height: 16px; }

/* ===========================
   PAGE HEADER
=========================== */
.page-header {
  padding: 28px 16px 20px;
  border-bottom: 1px solid var(--border);
}
.page-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.page-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 8vw, 42px);
  font-weight: 900;
  font-style: italic;
  text-transform: uppercase;
  line-height: .96;
  letter-spacing: -.01em;
  color: #fff;
  margin-bottom: 8px;
}
.page-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.page-meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
}
.page-meta-item svg { width: 13px; height: 13px; color: var(--accent); }

/* ===========================
   FILTERS
=========================== */
.filters-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.filters-title {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.filters-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.filter-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.filter-field.wide {
  grid-column: 1 / -1;
}
.filter-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.filter-select,
.filter-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  color: var(--fg);
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color .2s;
  appearance: auto;
}
.filter-select:focus,
.filter-input:focus { border-color: var(--accent); }
.filter-select option { background: var(--surface); }
.filter-input::placeholder { color: var(--muted); }

.filters-actions {
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.results-summary {
  font-size: 11px;
  color: var(--muted);
}
.results-summary strong { color: var(--accent); }
.btn-clear {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0;
  display: none;
}
.btn-clear.visible { display: inline; }
.btn-clear:hover { color: var(--accent); }

/* ===========================
   LOADING / ERROR / EMPTY
=========================== */
.state-msg {
  padding: 60px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}
.state-msg .icon {
  font-size: 36px;
  margin-bottom: 12px;
  opacity: .5;
}
.state-msg h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 6px;
}

/* ─── Skeleton shimmer ─── */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 3px;
}

.skeleton-block {
  margin: 16px 16px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.skeleton-header {
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.skeleton-row {
  height: 40px;
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.skeleton-row:last-child { border-bottom: none; }
.sk-pill { height: 12px; border-radius: 6px; }

/* ===========================
   DIA — grupo de provas por data do programa
=========================== */
.day-header {
  margin: 20px 16px 0;
  border-radius: 6px;
  overflow: hidden;
}
.day-header-inner {
  background: var(--surface2);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.day-date {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--fg);
  flex-grow: 1;
}
.day-week {
  color: var(--accent);
  font-weight: 700;
  margin-left: 6px;
}
.day-count {
  font-size: 11px;
  color: var(--muted);
}
.day-chevron {
  color: var(--muted);
  transition: transform .15s ease;
}
.day-collapsed .day-chevron { transform: rotate(-90deg); }
.day-collapsed .day-provas { display: none; }
.day-provas .prova-block { margin: 12px 0 0; }
.day-provas .prova-block:first-child { margin-top: 4px; }

/* ===========================
   PROVA CARD
=========================== */
.prova-block {
  margin: 16px 16px 0;
}
.prova-block:last-child { margin-bottom: 0; }

.prova-meta-item {
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 600;
}

/* Badge destacado pra provas especiais (Copa Ouro, GP, Clássico etc) */
.prova-especial {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: .04em;
  background: linear-gradient(135deg, var(--accent-dim), transparent);
  border: 1px solid var(--accent-glow);
  color: var(--accent);
  padding: 3px 9px;
  border-radius: 4px;
  margin-left: 6px;
  text-transform: uppercase;
  vertical-align: middle;
}

.prova-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  border-bottom: 1px solid var(--accent);
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.prova-hdr:hover { background: var(--surface2); }
.prova-hdr-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 5px;
  flex: 1;
  min-width: 0;
}
.prova-hdr-top {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.prova-badge {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.prova-desc {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
}
.prova-cats {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.cat-chip {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.prova-hdr-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.prova-count {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .06em;
}
.prova-toggle {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: transform .2s;
}
.prova-block.open .prova-toggle { transform: rotate(180deg); }

.prova-body {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.prova-block.open .prova-body { display: block; }

/* ===========================
   RESULTS TABLE
=========================== */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  min-width: 420px;
}
thead th {
  text-align: left;
  padding: 9px 12px;
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--surface2);
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.025); }
tbody td {
  padding: 10px 12px;
  vertical-align: middle;
}

/* Colocação column */
.col-pos {
  font-size: 13px;
  font-weight: 800;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  min-width: 32px;
}
.col-pos.top1 { color: #fbbf24; }  /* gold */
.col-pos.top2 { color: #94a3b8; }  /* silver */
.col-pos.top3 { color: #cd7c2f; }  /* bronze */

/* Cavaleiro column */
.col-rider {
  font-weight: 600;
  color: var(--fg);
  min-width: 120px;
}
.col-rider small {
  display: block;
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  margin-top: 1px;
}

/* Cavalo column */
.col-horse {
  font-weight: 600;
  color: var(--fg);
  min-width: 140px;
  font-style: italic;
}
.col-horse small {
  display: block;
  font-size: 9.5px;
  font-weight: 400;
  font-style: normal;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.4;
}

/* Numeric columns */
.col-num {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
}
.col-num.accent { color: var(--accent); }

/* Zero penalty highlight */
.penalty-zero { color: var(--green); font-weight: 700; }

/* No results */
.table-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
}

/* ===========================
   HIGHLIGHT on search
=========================== */
mark {
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 1px;
}

/* ===========================
   STATS DASHBOARD (busca global)
=========================== */
.stats-card {
  margin: 16px;
  padding: 18px 16px;
  background: linear-gradient(135deg, rgba(232,77,14,.08), var(--surface));
  border: 1px solid var(--accent);
  border-radius: 10px;
}
.stats-eyebrow {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.stats-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 6vw, 28px);
  font-weight: 900;
  font-style: italic;
  text-transform: uppercase;
  line-height: 1.04;
  letter-spacing: -.01em;
  color: #fff;
  margin-bottom: 14px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stat-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 8px;
  text-align: center;
}
.stat-value {
  font-family: var(--font-display);
  font-size: clamp(22px, 6vw, 32px);
  font-weight: 900;
  font-style: italic;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.stat-label {
  font-size: 8.5px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.2;
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-card { padding: 14px 12px; }
}

/* ===========================
   RESPONSIVE
=========================== */

/* Mobile: tabela compacta */
@media (max-width: 559px) {
  table {
    font-size: 11.5px;
    min-width: unset;
    width: 100%;
  }
  thead th,
  tbody td {
    padding: 8px 8px;
  }
  .col-rider, .col-horse { min-width: 80px; }
  .prova-hdr { padding: 10px 12px; }
  /* Esconde coluna Pontos no mobile — menos relevante */
  th:last-child, td:last-child { display: none; }
}

@media (min-width: 560px) {
  .filters-grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<div class="page">

  <!-- TOP BAR -->
  <div class="topbar">

          <div class="skeleton sk-pill" style="width:90px"></div>

      <div class="skeleton-block" style="margin-top:12px">

    <!-- Mensagem de erro -->

      <button onclick="loadData()" style="margin-top:16px;background:var(--accent);border:none;color:#fff;padding:10px 22px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer">TENTAR NOVAMENTE</button>
    </div>

    <!-- Resultados (injetado por JS) -->
    <div id="provas-container" style="padding-bottom:24px"></div>
  </div>

</div><!-- /.page -->

<script>
// ══════════════════════════════════════════════════════════════
//  CAVALAR.IA — RESULTADOS DE PROVAS
// ══════════════════════════════════════════════════════════════

// Extrai ano (4 dígitos começando com 20) do nome do torneio
function extrairAno(nome) {
  if (!nome) return null;
  const m = nome.match(/\b(20\d{2})\b/);
  return m ? parseInt(m[1]) : null;
}

const NOMES_MESES = ['—','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// Pega o ano efetivo: data_inicio se existir, senão do nome
function anoDoTorneio(t) {
  if (t.data_inicio) return parseInt(t.data_inicio.substring(0, 4));
  return t.ano;
}

// Mês a partir de data_inicio (1..12) ou null
function mesDoTorneio(t) {
  if (!t.data_inicio) return null;
  return parseInt(t.data_inicio.substring(5, 7));
}

// ─── Helpers ─────────────────────────────────────────────────
const $id = id => document.getElementById(id);

function escHtml(s) {
  if (s == null) return '—';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Extrai nome do cavaleiro (antes da federação/quebra de linha)
function nomeCavaleiro(s) {
  if (!s) return '';
  return s.split(/\n/)[0].split(/\s*\|\s*/)[0].trim();
}

// Separa nome do cavalo da genealogia
// Formatos possíveis:
//   "NOME CAVALO\n29/11/2021 | M | BH | HARAS | PAI | MÃE"  (2 linhas)
//   "NOME CAVALO 29/11/2021 | M | BH | ..."                  (1 linha com data)
//   "NOME CAVALO | M | BH | ..."                              (1 linha com |)
function parseCavalo(s) {
  if (!s) return { nome: '—', genealogia: null };
  const linhas = s.split(/\n/);
  const nome = linhas[0].trim();
  // Genealogia na segunda linha (formato mais comum no banco)
  if (linhas.length > 1 && linhas[1].trim()) {
    return { nome, genealogia: linhas[1].trim() };
  }
  // Genealogia na mesma linha após a data
  const dataMatch = nome.match(/^(.+?)\s+(\d{2}\/\d{2}\/\d{4}.*)$/);
  if (dataMatch) {
    return { nome: dataMatch[1].trim(), genealogia: dataMatch[2].trim() };
  }
  // Genealogia separada por " | "
  const partes = nome.split(/\s*\|\s*/);
  if (partes.length > 1) {
    return { nome: partes[0].trim(), genealogia: partes.slice(1).join(' | ').trim() };
  }
  return { nome, genealogia: null };
}

// Envolve ocorrências de `term` com <mark> para highlight
function highlight(text, term) {
  if (!term) return escHtml(text);
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

// ─── Carregar lista de torneios ──────────────────────────────
async function loadData() {
  $id('skeleton').style.display  = 'block';
  $id('error-msg').style.display = 'none';
  $id('provas-container').innerHTML = '';

  // Carrega map de profiles vinculados em paralelo (não bloqueia)
  loadProfileLinkMap();

  try {
    const { data: torneios, error: errT } = await sb
      .from('torneios')
      .select('id, nome, fonte, data_inicio, data_fim')
      .order('data_inicio', { ascending: false, nullsFirst: false })
      .order('id', { ascending: false });

    if (errT) throw errT;
    if (!torneios || torneios.length === 0) {
      showEmpty('Nenhum torneio encontrado no banco.');
      return;
    }

    // Enriquece com ano (data_inicio se houver, senão do nome)
    allTorneios = torneios.map(t => ({
      ...t,
      ano: t.data_inicio ? parseInt(t.data_inicio.substring(0, 4)) : extrairAno(t.nome),
    }));

    // Popula filtros de fonte, ano e mês
    populateFonteFilter();
    populateAnoFilter();
    populateMesFilter();

    // Popula a lista inicial de torneios (sem filtros = tudo, já ordenada por data DESC)
    populateTorneioFilter();

    // Carrega o primeiro torneio visível
    const primeiro = $id('filter-torneio').options[0];
    if (primeiro && primeiro.value) {
      await loadTorneio(Number(primeiro.value));
    } else {
      showEmpty('Nenhum torneio combina com os filtros.');
    }

  } catch (err) {
    $id('skeleton').style.display  = 'none';
    $id('error-msg').style.display = 'block';
    $id('error-text').textContent  = err.message || 'Erro desconhecido.';
  }
}

// ─── Filtros de fonte e ano ──────────────────────────────────
function populateFonteFilter() {
  const sel = $id('filter-fonte');
  const fontes = [...new Set(allTorneios.map(t => t.fonte).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas</option>';
  fontes.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    sel.appendChild(opt);
  });
}

function populateAnoFilter() {
  const sel = $id('filter-ano');
  const anos = [...new Set(allTorneios.map(t => t.ano).filter(Boolean))].sort((a, b) => b - a);
  sel.innerHTML = '<option value="">Todos</option>';
  anos.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    sel.appendChild(opt);
  });
  // Default: ano corrente (se existir nos dados)
  const anoAtual = new Date().getFullYear();
  if (anos.includes(anoAtual)) sel.value = String(anoAtual);
}

function populateMesFilter() {
  const sel = $id('filter-mes');
  sel.innerHTML = '<option value="">Todos</option>';
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = NOMES_MESES[m];
    sel.appendChild(opt);
  }
  // Default: mês corrente
  sel.value = String(new Date().getMonth() + 1);
}

// Popula o dropdown de torneios respeitando filtros fonte/ano/mes/busca
// (já ordenado por data DESC vindo da query Supabase)
function populateTorneioFilter() {
  const fonte = $id('filter-fonte').value;
  const ano = $id('filter-ano').value;
  const mes = $id('filter-mes').value;
  const busca = ($id('filter-torneio-search').value || '').trim().toLowerCase();

  const filtrados = allTorneios.filter(t => {
    if (fonte && t.fonte !== fonte) return false;
    if (ano && String(t.ano) !== ano) return false;
    if (mes) {
      const tMes = mesDoTorneio(t);
      if (!tMes || String(tMes) !== mes) return false;
    }
    if (busca && !(t.nome || '').toLowerCase().includes(busca)) return false;
    return true;
  });

  const sel = $id('filter-torneio');
  sel.innerHTML = '';

  if (filtrados.length === 0) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'Nenhum torneio com esses filtros';
    sel.appendChild(opt);
    return;
  }

  filtrados.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    const dataLabel = t.data_inicio
      ? `${t.data_inicio.substring(8,10)}/${t.data_inicio.substring(5,7)}/${t.data_inicio.substring(2,4)} · `
      : '';
    opt.textContent = `${dataLabel}[${t.fonte || '?'}] ${t.nome}`;
    sel.appendChild(opt);
  });
}

// ─── Carregar provas e resultados de um torneio ───────────────
// Cache do programa estruturado por torneio: { provaNumero: { data, dia_semana, hora, pista } }
let _provaProgramaInfo = {};

async function loadTorneio(torneioId) {
  $id('skeleton').style.display     = 'block';
  $id('error-msg').style.display    = 'none';
  $id('provas-container').innerHTML = '';
  $id('filter-prova').innerHTML     = '<option value="">Todas as provas</option>';
  _provaProgramaInfo = {};

  try {
    // 1. Torneio
    const { data: torneios, error: errT } = await sb
      .from('torneios').select('*').eq('id', torneioId).limit(1);
    if (errT) throw errT;
    renderTorneioHeader(torneios[0] || {});

    // 2. Provas ordenadas por numero (se preenchido) ou id
    const { data: provas, error: errP } = await sb
      .from('provas')
      .select('*')
      .eq('torneio_id', torneioId)
      .order('numero', { ascending: true, nullsFirst: false });
    if (errP) throw errP;
    allProvas = provas || [];

    // 3. Resultados apenas das provas deste torneio
    if (allProvas.length > 0) {
      const provaIds = allProvas.map(p => p.id);
      const { data: resultados, error: errR } = await sb
        .from('resultados')
        .select('*')
        .in('prova_id', provaIds)
        .order('prova_id', { ascending: true })
        .order('id',       { ascending: true });
      if (errR) throw errR;
      allResultados = resultados || [];
    } else {
      allResultados = [];
    }

    // 4. Programa estruturado (se houver): enriquece provas com data/hora/pista.
    //    Busca PROGRAMA e QUADRO DE HORÁRIOS — horários tem prioridade (mais atual).
    try {
      const { data: docs } = await sb.from('torneio_documentos')
        .select('tipo, conteudo_estruturado, data_publicacao')
        .eq('torneio_id', torneioId)
        .in('tipo', ['programa', 'horarios'])
        .not('conteudo_estruturado', 'is', null)
        .order('data_publicacao', { ascending: false });
      // Normaliza número de prova: remove zeros à esquerda mas preserva sufixos
      // letra (11A → "11A", 01 → "1", "01A" → "1A")
      const normNum = (raw) => {
        if (raw == null) return '';
        const s = String(raw).trim().toUpperCase();
        const m = s.match(/^0*(\d+)([A-Z]?)/);
        return m ? (m[1] + (m[2] || '')) : s;
      };

      for (const d of (docs || [])) {
        const estr = d.conteudo_estruturado || {};
        if (d.tipo === 'programa' && Array.isArray(estr.provas)) {
          for (const p of estr.provas) {
            const k = normNum(p.numero);
            if (!k) continue;
            if (!_provaProgramaInfo[k]) _provaProgramaInfo[k] = {};
            const cur = _provaProgramaInfo[k];
            if (p.data && !cur.data) cur.data = p.data;
            if (p.horario && !cur.hora) cur.hora = p.horario;
            if (p.tabela && !cur.tabela) cur.tabela = p.tabela;
          }
        }
        if (d.tipo === 'horarios' && Array.isArray(estr.dias)) {
          for (const dia of estr.dias) {
            for (const h of (dia.horarios || [])) {
              const k = normNum(h.prova_numero);
              if (!k) continue;
              if (!_provaProgramaInfo[k]) _provaProgramaInfo[k] = {};
              const cur = _provaProgramaInfo[k];
              cur.data = dia.data || cur.data;
              cur.dia_semana = dia.dia_semana || cur.dia_semana;
              cur.hora = h.hora || cur.hora;
              cur.pista = h.pista || cur.pista;
            }
          }
        }
      }

      // Enriquece allProvas. Prioridade:
      //   1. data_prova/dia_semana do banco (scraper extraiu direto do calendário)
      //   2. Programa estruturado (info do PDF processado por AI)
      for (const p of allProvas) {
        // Banco já tem data?
        if (p.data_prova) {
          // Formata pra DD/MM/YYYY pra exibir
          const [Y, M, D] = p.data_prova.split('-');
          p._data = `${D}/${M}/${Y}`;
          if (p.dia_semana) p._diaSemana = p.dia_semana;
        }
        // Fallback: programa estruturado
        const m = (p.nome || '').match(/PR\.\s*(\d+[A-Z]?)/i);
        const rawKey = m ? m[1] : (p.numero != null ? String(p.numero) : '');
        const k = normNum(rawKey);
        const info = _provaProgramaInfo[k];
        if (info) {
          if (!p._data && info.data) p._data = info.data;
          if (!p._diaSemana && info.dia_semana) p._diaSemana = info.dia_semana;
          if (info.hora && !p.horario) p.horario = info.hora;
          if (info.pista && !p.pista) p.pista = info.pista;
        }
      }
    } catch (_) {}

    populateProvaFilter();
    renderAll();

  } catch (err) {
    $id('skeleton').style.display  = 'none';
    $id('error-msg').style.display = 'block';
    $id('error-text').textContent  = err.message || 'Erro desconhecido.';
  }
}

function getFilters() {

    provaId:   $id('filter-prova').value,
    cavaleiro: $id('filter-cavaleiro').value.trim().toLowerCase(),
    cavalo:    $id('filter-cavalo').value.trim().toLowerCase(),

// ─── Busca global por cavaleiro ou cavalo ───────────────────
// Faz JOIN entre resultados, provas e torneios.
// Respeita filtros fonte/ano/mes.
const GLOBAL_SEARCH_LIMIT = 500;
async function buscaGlobal({ cavaleiro, cavalo, fonte, ano, mes }) {
  let q = sb
    .from('resultados')
    .select(`
      id, colocacao, cavaleiro_nome, cavalo_nome,
      penalidade, tempo, pontos, penalidade_2, tempo_2, prova_id,
      provas!inner (
        id, nome, numero, descricao, categorias, tipo_prova, torneio_id,
        torneios!inner ( id, nome, fonte, data_inicio )
      )
    `, { count: 'estimated' })
    .limit(GLOBAL_SEARCH_LIMIT);

  if (cavaleiro) q = q.ilike('cavaleiro_nome', `%${cavaleiro}%`);
  if (cavalo)    q = q.ilike('cavalo_nome',    `%${cavalo}%`);

  // Filtros transitivos via referenced table
  if (fonte) q = q.eq('provas.torneios.fonte', fonte);
  if (ano) {
    const ini = `${ano}-01-01`, fim = `${ano}-12-31`;
    q = q.gte('provas.torneios.data_inicio', ini).lte('provas.torneios.data_inicio', fim);
  }
  if (mes) {
    // PostgREST não suporta extract; vamos filtrar mes client-side
  }

  const { data, error } = await q;
  if (error) throw error;
  let resultados = data || [];

  // Filtro mês aplicado client-side
  if (mes) {
    resultados = resultados.filter(r => {
      const d = r.provas?.torneios?.data_inicio;
      return d && parseInt(d.substring(5, 7)) === parseInt(mes);
    });
  }
  // Filtros transitivos do PostgREST aplicam mas só ao registro referenciado —
  // garantir também client-side (caso registros sem torneios? defesa em profundidade)
  if (fonte) resultados = resultados.filter(r => r.provas?.torneios?.fonte === fonte);

  return resultados;
}

// ─── Renderização principal ──────────────────────────────────
function renderAll() {
  $id('skeleton').style.display = 'none';

  const filters = getFilters();
  const { provaId, cavaleiro, cavalo } = filters;
  const hasFilters = provaId || cavaleiro || cavalo;

  // Mostra / esconde botão de limpar
  $id('btn-clear').classList.toggle('visible', !!hasFilters);

  if (globalMode) {
    renderGlobalSearch(cavaleiro, cavalo);
    return;
  }

  // Modo torneio: mesma lógica de antes
  const provasFiltradas = provaId
    ? allProvas.filter(p => String(p.id) === provaId)
    : allProvas;

  const container = $id('provas-container');
  container.innerHTML = '';

  let totalVisiveis = 0;

  // Tem dados de data? Agrupa por dia.
  const temDataPrograma = provasFiltradas.some(p => p._data);
  if (temDataPrograma && !provaId) {
    const grupos = new Map();
    const semData = [];
    for (const p of provasFiltradas) {
      if (p._data) {
        const k = p._data;
        if (!grupos.has(k)) grupos.set(k, { data: p._data, diaSemana: p._diaSemana, provas: [] });
        grupos.get(k).provas.push(p);
      } else {
        semData.push(p);
      }
    }
    // Ordena grupos por data
    const sortedKeys = [...grupos.keys()].sort();
    let idxGlobal = 0;
    for (const k of sortedKeys) {
      const g = grupos.get(k);
      // Header do dia (clicável pra expandir/colapsar)
      const dayId = `day-${k.replace(/\D/g, '')}`;
      const dayHeader = document.createElement('div');
      dayHeader.className = 'day-header';
      dayHeader.innerHTML = `
        <div class="day-header-inner" onclick="toggleDay('${dayId}')">
          <div class="day-date">${escHtml(g.data)}${g.diaSemana ? ` <span class="day-week">${escHtml(g.diaSemana)}</span>` : ''}</div>
          <div class="day-count">${g.provas.length} prova${g.provas.length !== 1 ? 's' : ''}</div>
          <svg class="day-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="day-provas" id="${dayId}"></div>
      `;
      container.appendChild(dayHeader);
      const provasContainer = dayHeader.querySelector(`#${dayId}`);
      for (const prova of g.provas) {
        const resultados = allResultados.filter(r => {
          if (r.prova_id !== prova.id) return false;
          if (cavaleiro && !(r.cavaleiro_nome || '').toLowerCase().includes(cavaleiro)) return false;
          if (cavalo   && !(r.cavalo_nome    || '').toLowerCase().includes(cavalo))   return false;
          return true;
        });
        totalVisiveis += resultados.length;
        provasContainer.appendChild(buildProvaBlock(prova, resultados, idxGlobal++, cavaleiro, cavalo));
      }
    }
    if (semData.length) {
      const semDataHeader = document.createElement('div');
      semDataHeader.className = 'day-header';
      semDataHeader.innerHTML = `<div class="day-header-inner"><div class="day-date">Provas sem data específica</div></div><div class="day-provas"></div>`;
      container.appendChild(semDataHeader);
      const cont = semDataHeader.querySelector('.day-provas');
      for (const prova of semData) {
        const resultados = allResultados.filter(r => {
          if (r.prova_id !== prova.id) return false;
          if (cavaleiro && !(r.cavaleiro_nome || '').toLowerCase().includes(cavaleiro)) return false;
          if (cavalo   && !(r.cavalo_nome    || '').toLowerCase().includes(cavalo))   return false;
          return true;
        });
        totalVisiveis += resultados.length;
        cont.appendChild(buildProvaBlock(prova, resultados, idxGlobal++, cavaleiro, cavalo));
      }
    }
  } else {
    // Sem dados de dia ou filtro de prova específica → lista flat
    provasFiltradas.forEach((prova, idx) => {
      const resultados = allResultados.filter(r => {
        if (r.prova_id !== prova.id) return false;
        if (cavaleiro && !(r.cavaleiro_nome || '').toLowerCase().includes(cavaleiro)) return false;
        if (cavalo   && !(r.cavalo_nome    || '').toLowerCase().includes(cavalo))   return false;
        return true;
      });
      totalVisiveis += resultados.length;
      container.appendChild(buildProvaBlock(prova, resultados, idx, cavaleiro, cavalo));
    });
  }

  const sumEl = $id('results-summary');
  if (hasFilters) {
    sumEl.innerHTML = `<strong>${totalVisiveis}</strong> resultado${totalVisiveis !== 1 ? 's' : ''} encontrado${totalVisiveis !== 1 ? 's' : ''}`;
  } else {
    sumEl.innerHTML = `<strong>${allResultados.length}</strong> resultados em <strong>${allProvas.length}</strong> prova${allProvas.length !== 1 ? 's' : ''}`;
  }

  if (provasFiltradas.length === 0) {
    container.innerHTML = `<div class="state-msg"><div class="icon">🏇</div><h3>Nenhuma prova encontrada</h3><p>Tente ajustar os filtros.</p></div>`;
  }
}

// ─── Estatísticas para o dashboard de cavaleiro/cavalo ──────
// Retorna { totalProvas, totalEntradas, zerados, vitorias, top6 } e os respectivos %
function calcularEstatisticas(resultados) {
  const totalEntradas = resultados.length;
  const provaIds = new Set(resultados.map(r => r.prova_id));
  const totalProvas = provaIds.size;

  // Critério "percurso zerado": penalidade total começa com 0 (e não 0X, 01 etc)
  // Aceita "0", "0,0", "0\n(0+0)", "0 (0+0)"
  const zerados = resultados.filter(r => {
    const p = (r.penalidade || '').trim();
    return /^0([\s\n(,]|$)/.test(p);
  }).length;

  // Vitória: classificação "1º"
  const vitorias = resultados.filter(r => (r.colocacao || '').trim() === '1º').length;

  // Top 6: 1º a 6º
  const top6 = resultados.filter(r => /^[1-6]º$/.test((r.colocacao || '').trim())).length;

  const pct = (n) => totalEntradas > 0 ? Math.round((n / totalEntradas) * 100) : 0;
  return {
    totalProvas, totalEntradas,
    zerados, vitorias, top6,
    pctZerados:  pct(zerados),
    pctVitorias: pct(vitorias),
    pctTop6:     pct(top6),
  };
}

// Conta resultados por nome (primeira linha) — usa nomeCavaleiro / parseCavalo
function agruparPorNome(resultados, qual /* 'cavaleiro' | 'cavalo' */) {
  const counts = {};
  for (const r of resultados) {
    const n = qual === 'cavaleiro'
      ? nomeCavaleiro(r.cavaleiro_nome)
      : parseCavalo(r.cavalo_nome).nome;
    if (!n) continue;
    counts[n] = (counts[n] || 0) + 1;
  }
  return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}

function buildStatsCard(todosResultados, cavaleiroQuery, cavaloQuery) {
  // Determina o "alvo" do dashboard: o nome mais frequente que casou com a busca
  let alvo, eyebrow, ranking;
  if (cavaleiroQuery && cavaloQuery) {
    eyebrow = 'Combinação Cavaleiro + Cavalo';
    alvo = `${cavaleiroQuery.toUpperCase()} + ${cavaloQuery.toUpperCase()}`;
    ranking = [];
  } else if (cavaleiroQuery) {
    eyebrow = 'Resumo do cavaleiro';
    ranking = agruparPorNome(todosResultados, 'cavaleiro');
    alvo = ranking[0] ? ranking[0][0] : cavaleiroQuery.toUpperCase();
  } else {
    eyebrow = 'Resumo do cavalo';
    ranking = agruparPorNome(todosResultados, 'cavalo');
    alvo = ranking[0] ? ranking[0][0] : cavaloQuery.toUpperCase();
  }

  // Filtra resultados para apenas o alvo (estatística específica, não agregada)
  const resultadosDoAlvo = (cavaleiroQuery && cavaloQuery)
    ? todosResultados
    : todosResultados.filter(r => {
        if (cavaleiroQuery) return nomeCavaleiro(r.cavaleiro_nome) === alvo;
        return parseCavalo(r.cavalo_nome).nome === alvo;
      });

  const stats = calcularEstatisticas(resultadosDoAlvo);

  // Aviso quando a busca casou com mais de 1 nome distinto
  const outros = ranking.length > 1
    ? `<div style="margin-top:10px;font-size:10.5px;color:var(--muted);line-height:1.4">Sua busca casou com <strong style="color:var(--accent)">${ranking.length}</strong> ${cavaleiroQuery ? 'cavaleiros' : 'cavalos'}. Estatísticas acima são apenas de <strong>${escHtml(alvo)}</strong>. Refine a busca para ver outros (ex: ${ranking.slice(1, 3).map(r => `<em>${escHtml(r[0])}</em>`).join(', ')}).</div>`
    : '';

  return `
    <div class="stats-card">
      <div class="stats-eyebrow">${escHtml(eyebrow)}</div>
      <div class="stats-title">${escHtml(alvo)}</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">${stats.totalEntradas}</div>
          <div class="stat-label">Participações<br>(${stats.totalProvas} provas)</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${stats.pctZerados}%</div>
          <div class="stat-label">Percursos<br>Zero (${stats.zerados})</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${stats.pctVitorias}%</div>
          <div class="stat-label">Vitórias<br>(${stats.vitorias})</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${stats.pctTop6}%</div>
          <div class="stat-label">Top 6<br>(${stats.top6})</div>
        </div>
      </div>
      ${outros}
    </div>
  `;
}

// ─── Renderização em modo busca global ──────────────────────
async function renderGlobalSearch(cavaleiro, cavalo) {
  const container = $id('provas-container');
  container.innerHTML = `<div class="state-msg"><div class="icon">🔎</div><h3>Buscando...</h3></div>`;

  const sumEl = $id('results-summary');
  sumEl.innerHTML = `Procurando ${cavaleiro ? '"' + cavaleiro + '"' : ''}${cavaleiro && cavalo ? ' + ' : ''}${cavalo ? '"' + cavalo + '"' : ''}...`;

  let resultados;
  try {
    resultados = await buscaGlobal(getFilters());
  } catch (err) {
    container.innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><h3>Erro na busca</h3><p>${escHtml(err.message)}</p></div>`;
    return;
  }

  // Atualiza título da página
  const termo = cavaleiro || cavalo;
  $id('torneio-nome').textContent = `Buscar: "${termo}"`;
  $id('torneio-meta').innerHTML = '';

  if (resultados.length === 0) {
    container.innerHTML = `<div class="state-msg"><div class="icon">🏇</div><h3>Nada encontrado</h3><p>Tente ajustar os termos ou os filtros.</p></div>`;
    sumEl.innerHTML = `<strong>0</strong> resultados`;
    return;
  }

  // Agrupar por torneio → prova
  const porTorneio = new Map();
  for (const r of resultados) {
    const t = r.provas?.torneios;
    if (!t) continue;
    const tKey = t.id;
    if (!porTorneio.has(tKey)) {
      porTorneio.set(tKey, { torneio: t, provas: new Map() });
    }
    const provaKey = r.provas.id;
    if (!porTorneio.get(tKey).provas.has(provaKey)) {
      porTorneio.get(tKey).provas.set(provaKey, { prova: r.provas, resultados: [] });
    }
    porTorneio.get(tKey).provas.get(provaKey).resultados.push(r);
  }

  // Ordena torneios por data DESC
  const torneiosOrdenados = [...porTorneio.values()].sort((a, b) => {
    const da = a.torneio.data_inicio || '';
    const db = b.torneio.data_inicio || '';
    return db.localeCompare(da);
  });

  // Dashboard de estatísticas no topo (só em modo busca global)
  container.innerHTML = buildStatsCard(resultados, cavaleiro, cavalo);

  torneiosOrdenados.forEach((grupo, gi) => {
    const wrapTorneio = document.createElement('div');
    wrapTorneio.className = 'prova-block open';
    wrapTorneio.style.marginTop = '16px';

    const dataStr = grupo.torneio.data_inicio
      ? `${grupo.torneio.data_inicio.substring(8,10)}/${grupo.torneio.data_inicio.substring(5,7)}/${grupo.torneio.data_inicio.substring(0,4)}`
      : '';

    // Cabeçalho do torneio
    const hdr = `
      <div class="prova-hdr" style="background:var(--surface2)">
        <div class="prova-hdr-left">
          <div class="prova-hdr-top">
            <span class="prova-badge" style="background:var(--accent);color:#fff">[${escHtml(grupo.torneio.fonte || '?')}]</span>
            <span class="prova-desc">${escHtml(grupo.torneio.nome || '')}</span>
          </div>
          ${dataStr ? `<div class="prova-cats"><span class="cat-chip">${dataStr}</span></div>` : ''}
        </div>
      </div>
    `;

    const provasOrdenadas = [...grupo.provas.values()].sort((a, b) =>
      (a.prova.numero || 999) - (b.prova.numero || 999));

    const corpoProvas = provasOrdenadas.map((g, idx) =>
      buildProvaBlock(g.prova, g.resultados, idx, cavaleiro, cavalo).outerHTML
    ).join('');

    wrapTorneio.innerHTML = hdr + `<div style="padding-left:8px">${corpoProvas}</div>`;
    container.appendChild(wrapTorneio);
  });

  sumEl.innerHTML = `<strong>${resultados.length}</strong> resultado${resultados.length !== 1 ? 's' : ''} em <strong>${torneiosOrdenados.length}</strong> torneio${torneiosOrdenados.length !== 1 ? 's' : ''}${resultados.length >= GLOBAL_SEARCH_LIMIT ? ' (mostrando os ' + GLOBAL_SEARCH_LIMIT + ' mais recentes)' : ''}`;
}

// ─── Bloco de uma prova ──────────────────────────────────────
// Normaliza altura: extrai a PRIMEIRA medida no formato "X,YYm" (altura do percurso).
// Descarta segundas medidas ("1,30M X 1,50M" → "1,30m") que indicam largura/desempate.
// Retorna null se não houver altura reconhecível.
function alturaPrincipal(desc) {
  if (!desc) return null;
  const m = String(desc).match(/(\d{1,2}[,.]?\d{0,2})\s*[mM]\b/);
  if (!m) return null;
  return m[1].replace('.', ',') + 'm';
}

// Detecta nome especial da prova: Copa Ouro/Prata/Bronze, Mini GP, Clássico, GP.
// Procura tanto no campo nome quanto na descricao.
function nomeEspecialDaProva(prova) {
  const txt = `${prova.nome || ''} ${prova.descricao || ''}`;
  // Ordem importa: Mini GP antes de GP, etc
  if (/\bmini\s*(gp|grande\s*pr[êe]mio)\b/i.test(txt)) return 'Mini GP';
  if (/\bgrande\s*pr[êe]mio\b/i.test(txt))             return 'Grande Prêmio';
  if (/\bgp\b/i.test(txt))                              return 'GP';
  if (/\bcopa\s*ouro\b/i.test(txt))                     return 'Copa Ouro';
  if (/\bcopa\s*prata\b/i.test(txt))                    return 'Copa Prata';
  if (/\bcopa\s*bronze\b/i.test(txt))                   return 'Copa Bronze';
  if (/\bcl[áa]ssico\b/i.test(txt))                     return 'Clássico';
  return null;
}

// Tipo de prova em formato visual amigável (já em pt-BR)
function tipoProvaLabel(t) {
  if (!t || t === 'Outro') return null;
  return t; // "Duas Fases", "Cronometro", "Desempate", "Tempo Ideal", "Duas Voltas"
}

function buildProvaBlock(prova, resultados, idx, cavaleiro, cavalo) {
  const wrapper = document.createElement('div');
  wrapper.className = 'prova-block' + (idx === 0 ? ' open' : '');
  wrapper.id = `prova-${prova.id}`;

  const countText = `${resultados.length} resultado${resultados.length !== 1 ? 's' : ''}`;

  // Badge "PR. 01" / "PR. 11A" (preserva sufixo do nome) / "PROVA" fallback
  let numBadge = 'PROVA';
  if (prova.numero != null) {
    // Captura sufixo letra do nome: "PR. 11A - ..." → "11A"
    const m = (prova.nome || '').match(/PR\.\s*(\d+[A-Z]?)/i);
    numBadge = m ? `PR. ${m[1]}` : `PR. ${String(prova.numero).padStart(2, '0')}`;
  }

  // Altura padronizada (só "1,30m")
  const altura = alturaPrincipal(prova.descricao || prova.nome);
  const tipo   = tipoProvaLabel(prova.tipo_prova);
  const pista  = prova.pista; // se existir no schema
  const horario = prova.horario;

  // Header: altura + categorias + tipo. Se algo falta, simplesmente não mostra.
  const cats = prova.categorias
    ? prova.categorias.split('/').map(c => c.trim()).filter(Boolean)
    : [];
  const catsHtml = cats.length
    ? `<div class="prova-cats">${cats.map(c => `<span class="cat-chip">${escHtml(c)}</span>`).join('')}</div>`
    : '';

  // Subheader: tipo + pista + horário (só os campos com dado)
  const metaParts = [];
  if (tipo) metaParts.push(`<span class="prova-meta-item">${escHtml(tipo)}</span>`);
  if (pista) metaParts.push(`<span class="prova-meta-item">📍 ${escHtml(pista)}</span>`);
  if (horario) metaParts.push(`<span class="prova-meta-item">🕐 ${escHtml(horario)}</span>`);
  const metaHtml = metaParts.length
    ? `<div class="prova-meta" style="margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;font-size:10.5px;color:var(--muted)">${metaParts.join('')}</div>`
    : '';

  // Linha principal: PR.NN — altura — nome curto (sem altura redundante)
  // Se não tem altura, usa a descricao bruta
  const descLinha = altura || (prova.descricao || prova.nome || '—');

  // Nome especial (Copa Ouro/Prata/Bronze, GP, Clássico, Mini GP)
  const especial = nomeEspecialDaProva(prova);
  const especialHtml = especial
    ? `<span class="prova-especial">🏆 ${escHtml(especial)}</span>`
    : '';

  wrapper.innerHTML = `
    <div class="prova-hdr" onclick="toggleProva(${prova.id})">
      <div class="prova-hdr-left">
        <div class="prova-hdr-top">
          <span class="prova-badge">${escHtml(numBadge)}</span>
          <span class="prova-desc">${escHtml(descLinha)}</span>
          ${especialHtml}
        </div>
        ${catsHtml}
        ${metaHtml}
      </div>
      <div class="prova-hdr-right">
        <span class="prova-count">${countText}</span>
        <span class="prova-toggle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
    </div>
    <div class="prova-body">
      ${buildResultsTable(prova, resultados, cavaleiro, cavalo)}
    </div>
  `;

  return wrapper;
}

// ─── Tabela de resultados ─────────────────────────────────────
// Define colunas dependendo do tipo da prova
function colunasParaTipo(tipo) {
  switch (tipo) {
    case 'Duas Fases':
      return [
        { label: 'Pen.', key: 'penalidade', cls: 'col-num' },
        { label: 'T 1ª', key: 'tempo',      cls: 'col-num' },
        { label: 'T 2ª', key: 'tempo_2',    cls: 'col-num accent' },
      ];
    case 'Desempate':
    case 'Duas Voltas':
      return [
        { label: 'Pen 1ª', key: 'penalidade',   cls: 'col-num' },
        { label: 'T 1ª',   key: 'tempo',        cls: 'col-num' },
        { label: 'Pen 2ª', key: 'penalidade_2', cls: 'col-num' },
        { label: 'T 2ª',   key: 'tempo_2',      cls: 'col-num accent' },
      ];
    default: // Tabela A / Tempo Ideal / Cronometro / Outro
      return [
        { label: 'Tempo', key: 'tempo',      cls: 'col-num' },
        { label: 'Pen.',  key: 'penalidade', cls: 'col-num' },
        { label: 'Pontos',key: 'pontos',     cls: 'col-num accent' },
      ];
  }
}

function buildResultsTable(prova, resultados, cavaleiro, cavalo) {
  if (resultados.length === 0) {
    return `<div class="table-empty">Nenhum resultado para os filtros aplicados.</div>`;
  }

  const cols = colunasParaTipo(prova.tipo_prova);

  const rows = resultados.map(r => {
    const cells = cols.map(c => {
      const v = r[c.key];
      let extraCls = '';
      if (c.key === 'penalidade' && (v === '0' || v === '0.0' || v === '0,0')) extraCls = ' penalty-zero';
      return `<td class="${c.cls}${extraCls}">${escHtml(v)}</td>`;
    }).join('');
    return `
      <tr>
        <td><span class="${posClass(r.colocacao)}">${escHtml(r.colocacao)}</span></td>
        <td class="col-rider">${(() => { const n = nomeCavaleiro(r.cavaleiro_nome); return linkifyCavaleiro(n, highlight(n, cavaleiro)); })()}</td>
        <td class="col-horse">${(() => { const c = parseCavalo(r.cavalo_nome); return highlight(c.nome, cavalo) + (c.genealogia ? `<small>${escHtml(c.genealogia)}</small>` : ''); })()}</td>
        ${cells}
      </tr>`;
  }).join('');

  const headerCells = cols.map(c => `<th>${escHtml(c.label)}</th>`).join('');
  const tipoLabel = prova.tipo_prova && prova.tipo_prova !== 'Outro'
    ? `<div style="padding:6px 12px;background:var(--surface2);font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Tipo: ${escHtml(prova.tipo_prova)}</div>`
    : '';

  return `
    ${tipoLabel}
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Cavaleiro</th>
            <th>Cavalo</th>
            ${headerCells}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function onTextFilter() {

    const cav = $id('filter-cavaleiro').value.trim();

// ─── Inicializa ───────────────────────────────────────────────
// Se URL tem ?torneio=ID, carrega esse torneio direto.
// Estratégia: carrega TODA a lista de torneios, define filtros baseado
// no torneio do param (ao invés de pré-selecionar mês atual), depois
// chama loadTorneio. Garante que o dropdown e a página mostrem o evento certo.
const _urlParams = new URLSearchParams(window.location.search);
const _torneioParam = _urlParams.get('torneio');

if (_torneioParam) {
  (async () => {
    $id('skeleton').style.display  = 'block';
    $id('error-msg').style.display = 'none';
    try {
      // 1. Carrega lista pra ter context dos torneios
      const { data: torneios } = await sb
        .from('torneios')
        .select('id, nome, fonte, data_inicio, data_fim')
        .order('data_inicio', { ascending: false, nullsFirst: false })
        .order('id', { ascending: false });
      allTorneios = (torneios || []).map(t => ({
        ...t, ano: t.data_inicio ? parseInt(t.data_inicio.substring(0, 4)) : extrairAno(t.nome),
      }));

      // 2. Acha o torneio do param
      const tParam = allTorneios.find(x => x.id === Number(_torneioParam));

      // 3. Popula filtros — usa OS DADOS DO TORNEIO em vez dos defaults
      populateFonteFilter();
      populateAnoFilter();   // pré-seleciona ano corrente
      populateMesFilter();   // pré-seleciona mês corrente
      // Sobrescreve com os do torneio do param
      if (tParam) {
        $id('filter-fonte').value = tParam.fonte || '';
        const anoT = anoDoTorneio(tParam);
        if (anoT) $id('filter-ano').value = String(anoT);
        const mesT = mesDoTorneio(tParam);
        if (mesT) $id('filter-mes').value = String(mesT);
        else $id('filter-mes').value = ''; // se torneio não tem mês conhecido, mostra todos
      }
      populateTorneioFilter();

      // 4. Tenta selecionar no dropdown; se falhou (filtros restritivos),
      // limpa fonte/ano/mês e tenta de novo
      const sel = $id('filter-torneio');
      sel.value = _torneioParam;
      if (sel.value !== _torneioParam) {
        $id('filter-fonte').value = '';
        $id('filter-ano').value = '';
        $id('filter-mes').value = '';
        populateTorneioFilter();
        sel.value = _torneioParam;
      }

      // 5. Carrega resultados do torneio (loadTorneio faz fetch direto pelo id,
      // não depende do dropdown)
      await loadTorneio(Number(_torneioParam));
    } catch (e) {
      $id('skeleton').style.display = 'none';
      $id('error-msg').style.display = 'block';
      $id('error-text').textContent = e.message || 'Erro';
    }
  })();
} else {
  loadData();
}
</script>
</body>
</html>
