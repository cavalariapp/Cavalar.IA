<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReqLab — Gestão de Pesquisa Equina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d6dbe2; border-radius: 6px; border: 2px solid #f5f7f9; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  "use strict";

  // ----------------------------------------------------------------- state
  var state = { screen: 'visao', profile: 'orientado', step: 2 };

  // -------------------------------------------------------------- helpers
  function css(o) {
    return Object.keys(o).map(function (k) {
      return k.replace(/[A-Z]/g, function (m) { return '-' + m.toLowerCase(); }) + ':' + o[k];
    }).join('; ');
  }
  function navStyle(k) {
    var a = state.screen === k;
    return css({ display: 'flex', alignItems: 'center', gap: '11px', padding: '8px 9px', borderRadius: '6px', fontSize: '13.5px', fontWeight: a ? 600 : 500, color: a ? '#1d4ed8' : '#566071', background: a ? '#eaf1fd' : 'transparent', cursor: 'pointer' });
  }
  function profStyle(k) {
    var a = state.profile === k;
    return css({ padding: '6px 13px', borderRadius: '6px', border: 'none', cursor: 'pointer', fontSize: '12.5px', fontWeight: 600, fontFamily: "'IBM Plex Sans',sans-serif", color: a ? '#1b1f27' : '#8a93a0', background: a ? '#fff' : 'transparent', boxShadow: a ? '0 1px 2px rgba(0,0,0,.10)' : 'none' });
  }

  // ------------------------------------------------------------ tone pills
  var ok = { background: '#e7f6ee', color: '#177a52' };
  var warn = { background: '#fdf2dc', color: '#9a6a12' };
  var crit = { background: '#fdecec', color: '#c0392b' };
  function pill(b) {
    return css({ background: b.background, color: b.color, padding: '3px 8px', borderRadius: '5px', fontWeight: 600, fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px' });
  }

  // ------------------------------------------------------------------ icons
  var ico = {
    grid: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>',
    flask: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v3.5L3.2 12.3A1 1 0 0 0 4.1 14h7.8a1 1 0 0 0 .9-1.7L10 5.5V2"/><line x1="5" y1="2" x2="11" y2="2"/></svg>',
    table: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1.5"/><line x1="2" y1="6.7" x2="14" y2="6.7"/><line x1="8" y1="3" x2="8" y2="13"/></svg>',
    bars: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="13" x2="3" y2="9.5"/><line x1="8" y1="13" x2="8" y2="4"/><line x1="13" y1="13" x2="13" y2="7"/></svg>',
    cal: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="11" rx="1.5"/><line x1="2" y1="6.3" x2="14" y2="6.3"/><line x1="5" y1="1.7" x2="5" y2="4"/><line x1="11" y1="1.7" x2="11" y2="4"/></svg>',
    check: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" rx="2.5"/><path d="M5 8.2l2 2 4-4.2"/></svg>',
    sliders: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="2.5" y1="5" x2="13.5" y2="5"/><circle cx="6" cy="5" r="1.7"/><line x1="2.5" y1="11" x2="13.5" y2="11"/><circle cx="10" cy="11" r="1.7"/></svg>',
    bulb: '<svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="#1d4ed8" stroke-width="1.6" style="flex:none; margin-top:1px;"><path d="M8 1.5a4.5 4.5 0 0 0-2.6 8.2c.4.3.6.8.6 1.3v.5h4v-.5c0-.5.2-1 .6-1.3A4.5 4.5 0 0 0 8 1.5Z" stroke-linejoin="round"/><line x1="6.4" y1="14" x2="9.6" y2="14" stroke-linecap="round"/></svg>',
    warnTri: '<svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="#9a6a12" stroke-width="1.6" style="flex:none; margin-top:1px;"><path d="M8 2L1.5 13.5h13L8 2Z" stroke-linejoin="round"/><line x1="8" y1="6.5" x2="8" y2="9.5" stroke-linecap="round"/><circle cx="8" cy="11.4" r="0.6" fill="#9a6a12" stroke="none"/></svg>'
  };

  var logo = '<div style="display:flex; align-items:center; gap:10px;">' +
    '<svg width="34" height="34" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg"><rect width="34" height="34" rx="8" fill="#14506e"/><polyline points="7,23 13,17 19,20 27,10" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="23" r="1.9" fill="#7fc4ff"/><circle cx="27" cy="10" r="1.9" fill="#7fc4ff"/></svg>' +
    '<div style="line-height:1;"><div style="font:700 19px \'IBM Plex Sans\',sans-serif; color:#14506e; letter-spacing:-0.01em;">ReqLab</div><div style="font:600 8px \'IBM Plex Mono\',monospace; color:#8a93a0; letter-spacing:0.1em; margin-top:3px;">REPRODUÇÃO EQUINA</div></div></div>';

  // -------------------------------------------------------------- sidebar
  function sidebar() {
    function item(k, icon, label, extra) {
      return '<div style="' + navStyle(k) + '" data-act="go" data-screen="' + k + '">' + icon + label + (extra || '') + '</div>';
    }
    var badge = '<span style="margin-left:auto; font:600 10px/1 \'IBM Plex Mono\',monospace; background:#fdecec; color:#cc4433; padding:2px 6px; border-radius:20px;">3</span>';
    return '<aside style="width:230px; flex:none; background:#fbfcfd; border-right:1px solid #e9ecf0; padding:18px 14px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;">' +
      '<div style="padding:4px 6px 18px;">' + logo + '</div>' +
      '<div style="font:600 10px/1 \'IBM Plex Mono\',monospace; color:#aab2bd; letter-spacing:0.12em; padding:6px 8px 8px;">MENU</div>' +
      '<nav style="display:flex; flex-direction:column; gap:2px;">' +
        item('visao', ico.grid, 'Visão geral') +
        item('pesquisas', ico.flask, 'Pesquisas') +
        item('dados', ico.table, 'Dados') +
        item('analises', ico.bars, 'Análises') +
        item('cronograma', ico.cal, 'Cronograma') +
        item('tarefas', ico.check, 'Tarefas', badge) +
      '</nav>' +
      '<div style="font:600 10px/1 \'IBM Plex Mono\',monospace; color:#aab2bd; letter-spacing:0.12em; padding:18px 8px 8px;">CONFIGURAÇÃO</div>' +
      '<nav style="display:flex; flex-direction:column; gap:2px;">' +
        item('config', ico.sliders, 'Nova pesquisa') +
      '</nav>' +
      '<div style="margin-top:auto; padding-top:16px; border-top:1px solid #eceff3; display:flex; align-items:center; gap:10px;">' +
        '<div style="width:31px; height:31px; flex:none; border-radius:50%; background:#dde4ee; color:#3a4658; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:12px;">' + d.userInit + '</div>' +
        '<div style="line-height:1.2; min-width:0;"><div style="font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + d.userName + '</div><div style="font:500 10px/1 \'IBM Plex Mono\',monospace; color:#8a93a0;">' + d.userRole + '</div></div>' +
      '</div>' +
    '</aside>';
  }

  // --------------------------------------------------------------- topbar
  function topbar() {
    return '<div style="height:56px; flex:none; border-bottom:1px solid #e9ecf0; background:#fff; display:flex; align-items:center; padding:0 24px; gap:14px; position:sticky; top:0; z-index:5;">' +
      '<div style="display:flex; align-items:center; gap:8px; padding:6px 11px; border:1px solid #dde2e8; border-radius:7px; font-size:13px; font-weight:500; color:#2b3340; cursor:pointer;">Protocolo hormonal · dinâmica folicular<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#8a93a0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg></div>' +
      '<div style="margin-left:auto; display:flex; align-items:center; gap:14px;">' +
        '<div style="display:flex; align-items:center; gap:8px; font:500 11px/1 \'IBM Plex Mono\',monospace; color:#1f9d6b;"><span style="width:7px; height:7px; border-radius:50%; background:#1f9d6b; box-shadow:0 0 0 3px #1f9d6b22;"></span>TEMPO REAL</div>' +
        '<div style="display:flex; align-items:center; gap:4px; padding:3px; background:#f0f2f5; border-radius:8px;">' +
          '<span style="font:500 11px \'IBM Plex Sans\',sans-serif; color:#8a93a0; padding-left:6px;">Perfil</span>' +
          '<button style="' + profStyle('orientado') + '" data-act="prof" data-profile="orientado">Orientado</button>' +
          '<button style="' + profStyle('orientador') + '" data-act="prof" data-profile="orientador">Orientador</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ------------------------------------------------- screen: visão (orientado)
  function visaoOrientado() {
    var activity = d.activity.map(function (a) {
      return '<div style="display:flex; gap:11px; align-items:flex-start;"><span style="width:8px; height:8px; border-radius:50%; margin-top:5px; flex:none; background:' + a.c + ';"></span><div style="min-width:0;"><div style="font-size:13px; line-height:1.35;">' + a.t + '</div><div style="font:500 10.5px \'IBM Plex Mono\',monospace; color:#9aa3b0; margin-top:2px;">' + a.w + '</div></div></div>';
    }).join('');
    var pend = d.tPend.map(function (t) {
      return '<div style="display:flex; align-items:center; gap:11px; padding:10px 12px; border:1px solid #eef1f4; border-radius:8px;"><span style="width:15px; height:15px; flex:none; border:1.6px solid #cfd6df; border-radius:5px;"></span><div style="flex:1; min-width:0;"><div style="font-size:13px; font-weight:500;">' + t.t + '</div><div style="font:500 10.5px \'IBM Plex Mono\',monospace; color:#9aa3b0; margin-top:1px;">vence ' + t.due + '</div></div><span style="font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:5px; background:' + t.prc.background + '; color:' + t.prc.color + ';">' + t.pr + '</span></div>';
    }).join('');
    return '<div>' +
      '<div style="margin-bottom:18px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Bom dia, Marina.</h2><div style="font-size:13px; color:#6b7585;">Efeito de eCG e GnRH na dinâmica folicular de éguas · Doutorado</div></div>' +
      '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:18px 20px; margin-bottom:14px;">' +
        '<div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;"><div><div style="font-size:11.5px; color:#8a93a0; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Progresso do experimento</div><div style="font-size:15px; font-weight:600; margin-top:3px;">Coletas 5 de 8 · etapa D6 concluída</div></div><div style="font:600 30px/1 \'IBM Plex Mono\',monospace; color:#2f63d6;">62%</div></div>' +
        '<div style="height:8px; background:#eef1f4; border-radius:6px; overflow:hidden;"><div style="width:62%; height:100%; background:#2f63d6; border-radius:6px;"></div></div>' +
      '</div>' +
      '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px;">' +
        kpi('Registros coletados', '312', '▲ 18 esta semana', '#1f9d6b', 600) +
        kpi('Coletas concluídas', '5/8', 'restam 3 etapas', '#7a8492', 400) +
        kpi('Próxima coleta', '2 dias', 'D8 · 25 jun', '#7a8492', 400) +
        kpi('Tarefas pendentes', '3', '1 vence hoje', '#cc4433', 600, '#cc4433') +
      '</div>' +
      '<div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;">' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:16px 18px;"><div style="font-size:14px; font-weight:600; margin-bottom:12px;">Atividade recente</div><div style="display:flex; flex-direction:column; gap:13px;">' + activity + '</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:16px 18px;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;"><div style="font-size:14px; font-weight:600;">Próximas tarefas</div><span data-act="go" data-screen="tarefas" style="font-size:12px; color:#2f63d6; font-weight:600; cursor:pointer;">Ver todas</span></div><div style="display:flex; flex-direction:column; gap:9px;">' + pend + '</div></div>' +
      '</div>' +
      '<div style="display:flex; gap:12px; align-items:flex-start; background:#eaf1fd; border:1px solid #d3e0fa; border-radius:10px; padding:13px 15px;">' + ico.bulb +
        '<div style="font-size:12.8px; line-height:1.45; color:#1c3a78;"><strong>Insight automático:</strong> o grupo eCG apresenta variabilidade <strong>73% maior</strong> que o Controle no diâmetro folicular. Considere revisar a dose ou ampliar o n do grupo. <span data-act="go" data-screen="analises" style="color:#1d4ed8; font-weight:600; cursor:pointer; white-space:nowrap;">Abrir análises →</span></div>' +
      '</div>' +
    '</div>';
  }

  function kpi(label, value, sub, subColor, subWeight, valColor) {
    var vc = valColor ? ' color:' + valColor + ';' : '';
    return '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:9px; padding:14px 15px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">' + label + '</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;' + vc + '">' + value + '</div><div style="font-size:11px; color:' + subColor + '; font-weight:' + subWeight + ';">' + sub + '</div></div>';
  }

  // ------------------------------------------------ screen: visão (orientador)
  function visaoOrientador() {
    var rows = d.researches.map(function (r) {
      return '<div style="display:flex; align-items:center; gap:14px; padding:13px 18px; border-top:1px solid #f3f5f8; cursor:pointer;">' +
        '<div style="width:34px; height:34px; flex:none; border-radius:50%; background:#dde4ee; color:#3a4658; display:flex; align-items:center; justify-content:center; font:600 12px \'IBM Plex Sans\',sans-serif;">' + r.initials + '</div>' +
        '<div style="flex:1; min-width:0;"><div style="display:flex; align-items:center; gap:8px;"><span style="font-size:13.5px; font-weight:600;">' + r.name + '</span><span style="font:500 9.5px \'IBM Plex Mono\',monospace; color:#8a93a0; border:1px solid #e1e5ea; padding:1px 6px; border-radius:20px;">' + r.lvl + '</span></div><div style="font-size:12px; color:#6b7585; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + r.title + '</div></div>' +
        '<div style="width:84px; flex:none;"><div style="height:6px; background:#eef1f4; border-radius:4px; overflow:hidden;"><div style="height:100%; border-radius:4px; width:' + r.progw + '; background:' + r.dot + ';"></div></div><div style="font:500 10px \'IBM Plex Mono\',monospace; color:#9aa3b0; margin-top:4px; text-align:right;">' + r.prog + '%</div></div>' +
        '<span style="flex:none; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px; background:' + r.sc.background + '; color:' + r.sc.color + ';">' + r.status + '</span>' +
      '</div>';
    }).join('');
    var alerts = d.alerts.map(function (al) {
      return '<div style="display:flex; gap:11px; padding:11px 12px; border-radius:9px; background:' + al.bg + ';"><span style="width:4px; flex:none; border-radius:3px; background:' + al.tone + ';"></span><div style="min-width:0;"><div style="font-size:12.5px; line-height:1.4; color:#2b3340;">' + al.t + '</div><div style="font:500 10px \'IBM Plex Mono\',monospace; color:#9aa3b0; margin-top:3px;">' + al.w + '</div></div></div>';
    }).join('');
    return '<div>' +
      '<div style="margin-bottom:18px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Painel do orientador</h2><div style="font-size:13px; color:#6b7585;">Laboratório de Reprodução Equina · Unesp Jaboticabal · visão consolidada</div></div>' +
      '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px;">' +
        kpi('Pesquisas ativas', '6', '2 doutorado · 2 mestrado · 2 IC', '#7a8492', 400) +
        kpi('Orientados', '9', 'todos com dados ativos', '#7a8492', 400) +
        kpi('Coletas esta semana', '14', '▲ 4 vs. semana anterior', '#1f9d6b', 600) +
        '<div style="background:#fff; border:1px solid #f1d9d4; border-radius:9px; padding:14px 15px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Alertas abertos</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px; color:#cc4433;">2</div><div style="font-size:11px; color:#cc4433; font-weight:600;">1 atraso · 1 anomalia</div></div>' +
      '</div>' +
      '<div style="display:grid; grid-template-columns:1.55fr 1fr; gap:14px;">' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; overflow:hidden;"><div style="padding:14px 18px; border-bottom:1px solid #eef1f4; font-size:14px; font-weight:600;">Pesquisas em andamento</div><div>' + rows + '</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:16px 18px;"><div style="font-size:14px; font-weight:600; margin-bottom:13px;">Alertas e anomalias</div><div style="display:flex; flex-direction:column; gap:11px;">' + alerts + '</div></div>' +
      '</div>' +
    '</div>';
  }

  // --------------------------------------------------------- screen: análises
  function analises() {
    var stat = d.statRows.map(function (s) {
      return '<tr style="border-top:1px solid #f0f3f6; background:' + s.rowbg + ';"><td style="padding:10px 16px; font-family:\'IBM Plex Sans\',sans-serif; font-weight:600;">' + s.g + '</td><td style="padding:10px 12px;">' + s.n + '</td><td style="padding:10px 12px;">' + s.mean + '</td><td style="padding:10px 12px;">' + s.sd + '</td><td style="padding:10px 12px;"><span style="' + s.cvs + '">' + s.cv + '</span></td><td style="padding:10px 16px;"><span style="display:inline-flex; align-items:center; gap:6px; font:500 11.5px \'IBM Plex Sans\',sans-serif; color:' + s.stc + ';"><span style="width:7px; height:7px; border-radius:50%; background:' + s.dot + ';"></span>' + s.st + '</span></td></tr>';
    }).join('');
    return '<div>' +
      '<div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:16px;"><div><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Análises estatísticas</h2><div style="font-size:12.5px; color:#6b7585; font-family:\'IBM Plex Mono\',monospace;">312 registros · 24 animais · 3 grupos · atualizado há 2 min</div></div><div style="display:flex; gap:8px;"><button style="border:1px solid #dde2e8; background:#fff; color:#2b3340; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;">Filtros</button><button style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 14px; border-radius:7px; cursor:pointer;">Exportar PDF</button></div></div>' +
      '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px;">' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Registros coletados</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">312</div><div style="font-size:11px; color:#1f9d6b; font-weight:600;">▲ 18 esta semana</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Animais em estudo</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">24</div><div style="font-size:11px; color:#7a8492;">8 por grupo</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Próxima coleta</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">2 dias</div><div style="font-size:11px; color:#7a8492;">D8 · 25 jun</div></div>' +

        '<div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">' + stepper2('Número de grupos', '3') + stepper2('Animais por grupo', '8') + '</div>' +
        '<div><label style="display:block; font-size:12px; font-weight:600; color:#4b5563; margin-bottom:8px;">Nomes dos grupos</label><div style="display:flex; flex-direction:column; gap:8px;">' +
          groupRow('#94a3b8', 'Controle') + groupRow('#2f63d6', 'eCG') + groupRow('#1f9d6b', 'GnRH') +
        '</div></div>' +
        '</div>';
    } else if (state.step === 2) {
      var vars = d.wizVars.map(function (v) {
        var toggle = v.cond
          ? '<span style="width:30px; height:17px; border-radius:20px; background:#2f63d6; display:inline-flex; align-items:center; padding:2px; justify-content:flex-end;"><span style="width:13px; height:13px; border-radius:50%; background:#fff;"></span></span>'
          : '<span style="width:30px; height:17px; border-radius:20px; background:#dde2e8; display:inline-flex; align-items:center; padding:2px;"><span style="width:13px; height:13px; border-radius:50%; background:#fff;"></span></span>';
        return '<div style="display:grid; grid-template-columns:1.6fr 1fr 0.8fr 1fr 0.7fr; gap:0; border-top:1px solid #f0f3f6; align-items:center; font-size:12.5px;"><div style="padding:10px 12px; font-weight:600;">' + v.name + '</div><div style="padding:10px 12px; color:#566071;">' + v.type + '</div><div style="padding:10px 12px; color:#566071; font-family:\'IBM Plex Mono\',monospace;">' + v.unit + '</div><div style="padding:10px 12px; color:#566071; font-family:\'IBM Plex Mono\',monospace;">' + v.range + '</div><div style="padding:10px 12px;">' + toggle + '</div></div>';
      }).join('');
      body = '<div>' +
        '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;"><label style="font-size:12px; font-weight:600; color:#4b5563;">Variáveis coletadas</label><span style="font:500 11px \'IBM Plex Mono\',monospace; color:#9aa3b0;">4 variáveis · 2 com formatação condicional</span></div>' +
        '<div style="border:1px solid #eef1f4; border-radius:8px; overflow:hidden;"><div style="display:grid; grid-template-columns:1.6fr 1fr 0.8fr 1fr 0.7fr; gap:0; background:#fafbfc; font:600 10px \'IBM Plex Mono\',monospace; color:#8a93a0; letter-spacing:0.04em;"><div style="padding:9px 12px;">VARIÁVEL</div><div style="padding:9px 12px;">TIPO</div><div style="padding:9px 12px;">UNIDADE</div><div style="padding:9px 12px;">FAIXA ESPERADA</div><div style="padding:9px 12px;">COND.</div></div>' + vars + '</div>' +
        '<div style="margin-top:10px; border:1.5px dashed #cfd6df; border-radius:8px; padding:11px; text-align:center; font-size:12.5px; font-weight:600; color:#2f63d6; cursor:pointer;">+ Adicionar variável</div>' +
        '</div>';
    } else if (state.step === 3) {
      body = '<div style="display:flex; flex-direction:column; gap:16px;">' +
        '<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">' +
          field('Data de início', '17/06/2026') + field('Intervalo (dias)', '2') + field('Nº de coletas', '5') +
        '</div>' +
        '<div style="background:#f7f9fb; border:1px solid #eef1f4; border-radius:8px; padding:14px 16px;"><div style="font-size:12px; font-weight:600; color:#4b5563; margin-bottom:10px;">Cronograma gerado automaticamente</div><div style="display:flex; gap:8px; flex-wrap:wrap;">' +
          schedChip('D0 · 17/06') + schedChip('D2 · 19/06') + schedChip('D4 · 21/06') + schedChip('D6 · 23/06') + schedChip('D8 · 25/06') +
        '</div></div>' +
        '<div style="display:flex; align-items:center; gap:10px;"><span style="width:30px; height:17px; border-radius:20px; background:#2f63d6; display:inline-flex; align-items:center; padding:2px; justify-content:flex-end; flex:none;"><span style="width:13px; height:13px; border-radius:50%; background:#fff;"></span></span><span style="font-size:13px; color:#2b3340;">Enviar lembretes por e-mail 1 dia antes de cada coleta</span></div>' +
        '</div>';
    } else if (state.step === 4) {
      body = '<div>' +
        '<div style="display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:12px 14px; background:#e7f6ee; border:1px solid #b9e3cd; border-radius:8px;"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#177a52" stroke-width="1.7"><circle cx="8" cy="8" r="6.5"/><path d="M5.3 8.2l1.8 1.8 3.6-3.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:13px; font-weight:600; color:#177a52;">Tudo pronto — revise antes de criar a pesquisa.</span></div>' +
        '<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">' +
          summary('DELINEAMENTO', '3 grupos · 8 animais cada<br>24 animais no total') +
          summary('COLETAS', '5 coletas · intervalo 2 dias<br>17/06 a 25/06') +
          summary('VARIÁVEIS', '4 variáveis<br>2 com formatação condicional') +
          '<div style="border:1px solid #eef1f4; border-radius:8px; padding:13px 15px;"><div style="font:600 10px \'IBM Plex Mono\',monospace; color:#8a93a0; letter-spacing:0.05em;">REGISTROS PREVISTOS</div><div style="font:600 22px/1.2 \'IBM Plex Mono\',monospace; margin-top:4px; color:#2f63d6;">120</div></div>' +
        '</div>' +
        '</div>';
    }

    var footerRight = state.step === 4
      ? '<button style="border:1px solid #dde2e8; background:#fff; color:#2b3340; font:600 13px \'IBM Plex Sans\',sans-serif; padding:9px 16px; border-radius:7px; cursor:pointer;">Salvar como template</button><button style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 13px \'IBM Plex Sans\',sans-serif; padding:9px 18px; border-radius:7px; cursor:pointer;">Criar pesquisa</button>'
      : '<button style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 13px \'IBM Plex Sans\',sans-serif; padding:9px 20px; border-radius:7px; cursor:pointer;" data-act="wizNext">Próximo</button>';

    return '<div style="max-width:760px; margin:0 auto;">' +
      '<div style="margin-bottom:20px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Nova pesquisa</h2><div style="font-size:13px; color:#6b7585;">Configure o delineamento — o cronograma e as tabelas de dados são gerados automaticamente.</div></div>' +
      '<div style="display:flex; align-items:center; margin-bottom:22px;">' + stepper + '</div>' +
      '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:22px 24px;">' + body +
        '<div style="display:flex; align-items:center; justify-content:space-between; margin-top:22px; padding-top:18px; border-top:1px solid #eef1f4;"><button style="border:1px solid #dde2e8; background:#fff; color:#566071; font:500 13px \'IBM Plex Sans\',sans-serif; padding:9px 16px; border-radius:7px; cursor:pointer;" data-act="wizPrev">Voltar</button><div style="display:flex; gap:9px;">' + footerRight + '</div></div>' +
      '</div>' +
    '</div>';
  }
  function stepper2(label, value) {
    return '<div><label style="display:block; font-size:12px; font-weight:600; color:#4b5563; margin-bottom:6px;">' + label + '</label><div style="display:flex; align-items:center; border:1px solid #dde2e8; border-radius:7px; overflow:hidden;"><span style="width:38px; text-align:center; padding:9px 0; color:#8a93a0; cursor:pointer; border-right:1px solid #eef1f4;">−</span><span style="flex:1; text-align:center; font:600 14px \'IBM Plex Mono\',monospace;">' + value + '</span><span style="width:38px; text-align:center; padding:9px 0; color:#2f63d6; cursor:pointer; border-left:1px solid #eef1f4;">+</span></div></div>';
  }
  function groupRow(color, name) {
    return '<div style="display:flex; align-items:center; gap:10px; border:1px solid #dde2e8; border-radius:7px; padding:9px 11px;"><span style="width:9px; height:9px; border-radius:50%; background:' + color + ';"></span><span style="font-size:13.5px; flex:1;">' + name + '</span><span style="font:500 11px \'IBM Plex Mono\',monospace; color:#9aa3b0;">8 animais</span></div>';
  }
  function field(label, value) {
    return '<div><label style="display:block; font-size:12px; font-weight:600; color:#4b5563; margin-bottom:6px;">' + label + '</label><div style="border:1px solid #dde2e8; border-radius:7px; padding:9px 11px; font:500 13px \'IBM Plex Mono\',monospace;">' + value + '</div></div>';
  }
  function schedChip(label) {
    return '<span style="font:600 11.5px \'IBM Plex Mono\',monospace; background:#eaf1fd; color:#1d4ed8; padding:6px 11px; border-radius:7px;">' + label + '</span>';
  }
  function summary(label, html) {
    return '<div style="border:1px solid #eef1f4; border-radius:8px; padding:13px 15px;"><div style="font:600 10px \'IBM Plex Mono\',monospace; color:#8a93a0; letter-spacing:0.05em;">' + label + '</div><div style="font-size:13px; margin-top:6px; line-height:1.6;">' + html + '</div></div>';
  }

  // -------------------------------------------------------- derived data (d)
  var d;
  function buildData() {
    var isOri = state.profile === 'orientado';
    var researches = [
      { name: 'Marina Costa', initials: 'MC', lvl: 'Doutorado', title: 'Protocolo hormonal · dinâmica folicular', prog: 62, status: 'Atenção', sc: warn, dot: '#d99a18' },
      { name: 'João Reis', initials: 'JR', lvl: 'Mestrado', title: 'Criopreservação seminal', prog: 38, status: 'Em dia', sc: ok, dot: '#1f9d6b' },
      { name: 'Ana Vidal', initials: 'AV', lvl: 'Iniciação', title: 'Escore corporal × fertilidade', prog: 80, status: 'Em dia', sc: ok, dot: '#1f9d6b' },
      { name: 'Pedro Lima', initials: 'PL', lvl: 'Doutorado', title: 'Indução de ovulação', prog: 45, status: 'Atraso', sc: crit, dot: '#c0392b' },
      { name: 'Lia Souza', initials: 'LS', lvl: 'Mestrado', title: 'Maturação oocitária in vitro', prog: 20, status: 'Em dia', sc: ok, dot: '#1f9d6b' },
      { name: 'Bruno Tavares', initials: 'BT', lvl: 'Iniciação', title: 'Morfometria espermática', prog: 55, status: 'Em dia', sc: ok, dot: '#1f9d6b' }
    ].map(function (r) { r.progw = r.prog + '%'; return r; });

    var dataRows = [
      { animal: 'Égua 01', grupo: 'eCG', dia: 'D6', diam: '34,2', prog: '3,1', ps: pill(ok), ovul: 'Sim', ovOk: true },
      { animal: 'Égua 02', grupo: 'eCG', dia: 'D6', diam: '41,8', prog: '6,4', ps: pill(warn), ovul: 'Sim', ovOk: true },
      { animal: 'Égua 03', grupo: 'Controle', dia: 'D6', diam: '22,0', prog: '1,2', ps: pill(ok), ovul: 'Não', ovOk: false },
      { animal: 'Égua 04', grupo: 'GnRH', dia: 'D6', diam: '30,5', prog: '2,8', ps: pill(ok), ovul: 'Sim', ovOk: true },
      { animal: 'Égua 05', grupo: 'eCG', dia: 'D6', diam: '45,1', prog: '9,2', ps: pill(crit), ovul: 'Sim', ovOk: true },
      { animal: 'Égua 06', grupo: 'Controle', dia: 'D6', diam: '21,3', prog: '0,8', ps: pill(crit), ovul: 'Não', ovOk: false },
      { animal: 'Égua 07', grupo: 'GnRH', dia: 'D6', diam: '31,7', prog: '3,0', ps: pill(ok), ovul: 'Sim', ovOk: true },
      { animal: 'Égua 08', grupo: 'Controle', dia: 'D6', diam: '23,6', prog: '1,5', ps: pill(ok), ovul: 'Não', ovOk: false },
      { animal: 'Égua 09', grupo: 'eCG', dia: 'D6', diam: '38,9', prog: '4,7', ps: pill(warn), ovul: 'Sim', ovOk: true }
    ].map(function (r) { r.ovStyle = r.ovOk ? { background: '#e7f6ee', color: '#177a52' } : { background: '#eef1f4', color: '#6b7585' }; return r; });

    var done = [17, 19, 21];
    var calCells = [{ empty: true }];
    for (var dd = 1; dd <= 30; dd++) {
      var dot = null;
      if (done.indexOf(dd) !== -1) dot = '#1f9d6b';
      if (dd === 25) dot = '#2f63d6';
      if (dd === 27) dot = '#94a3b8';
      if (dd === 30) dot = '#d99a18';
      calCells.push({ label: String(dd), today: dd === 23, notToday: dd !== 23, dot: dot });
    }
    while (calCells.length < 35) calCells.push({ empty: true, notToday: true });

    var step = state.step;
    var wizSteps = ['Identificação', 'Grupos & animais', 'Variáveis', 'Frequência', 'Revisão'].map(function (label, i) {
      var circle = i < step ? { background: '#1f9d6b', color: '#fff' } : i === step ? { background: '#2f63d6', color: '#fff' } : { background: '#e9ecf0', color: '#8a93a0' };
      return {
        label: label, num: String(i + 1),
        cstyle: css({ width: '26px', height: '26px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '12px', fontWeight: 600, flex: 'none', cursor: 'pointer', fontFamily: "'IBM Plex Mono',monospace", background: circle.background, color: circle.color }),
        lstyle: css({ fontSize: '12.5px', fontWeight: i === step ? 600 : 500, color: i === step ? '#1b1f27' : '#8a93a0', cursor: 'pointer' })
      };
    });

    var wizVars = [
      { name: 'Diâmetro folicular', type: 'Numérico', unit: 'mm', range: '25 – 40', cond: true },
      { name: 'Progesterona', type: 'Numérico', unit: 'ng/mL', range: '1 – 4', cond: true },
      { name: 'Ovulação', type: 'Booleano', unit: '—', range: '—', cond: false },
      { name: 'Escore de muco', type: 'Categórico', unit: '1 – 5', range: '—', cond: false }
    ].map(function (v) { v.notCond = !v.cond; return v; });

    d = {
      userName: isOri ? 'Marina Costa' : 'Prof. Rui Alencar',
      userInit: isOri ? 'MC' : 'RA',
      userRole: isOri ? 'DOUTORANDA' : 'ORIENTADOR',
      activity: [
        { t: 'Coleta D6 registrada — 24 amostras', w: 'há 2 h', c: '#1f9d6b' },
        { t: 'Progesterona acima do esperado em Égua 05', w: 'há 5 h', c: '#d99a18' },
        { t: 'Cronograma atualizado: D8 em 25 jun', w: 'ontem', c: '#2f63d6' },
        { t: 'Dados D4 validados pelo orientador', w: 'há 2 dias', c: '#8a93a0' }
      ],
      tPend: [
        { t: 'Coleta D8 — ultrassom folicular', due: '25 jun', pr: 'Alta', prc: crit },
        { t: 'Dosagem de progesterona (lote 3)', due: '27 jun', pr: 'Média', prc: warn }
      ],
      tProg: [
        { t: 'Análise estatística parcial (ANOVA)', due: '24 jun', pr: 'Alta', prc: crit },
        { t: 'Revisar planilha de dados D6', due: '24 jun', pr: 'Média', prc: warn }
      ],
      tDone: [
        { t: 'Coleta D6 — 24 amostras', due: '23 jun' },
        { t: 'Setup do experimento', due: '15 jun' },
        { t: 'Definição de variáveis', due: '14 jun' }
      ],
      researches: researches,
      alerts: [
        { tone: '#c0392b', bg: '#fdecec', t: 'Pedro Lima — coleta D4 atrasada 3 dias', w: 'há 1 h' },
        { tone: '#d99a18', bg: '#fdf2dc', t: 'Marina Costa — variabilidade 73% acima do esperado (Grupo eCG)', w: 'há 3 h' },
        { tone: '#2f63d6', bg: '#eaf1fd', t: 'João Reis — novo conjunto de dados aguardando validação', w: 'ontem' }
      ],
      dataRows: dataRows,
      statRows: [
        { g: 'Controle', n: '8', mean: '24,1', sd: '2,3', cv: '9,5%', cvs: pill(ok), st: 'Normal', stc: '#177a52', dot: '#1f9d6b', rowbg: 'transparent' },
        { g: 'eCG', n: '8', mean: '35,2', sd: '5,8', cv: '16,5%', cvs: pill(warn), st: 'Alta variabilidade', stc: '#9a6a12', dot: '#d99a18', rowbg: '#fffdf6' },
        { g: 'GnRH', n: '8', mean: '31,0', sd: '3,1', cv: '10,0%', cvs: pill(ok), st: 'Normal', stc: '#177a52', dot: '#1f9d6b', rowbg: 'transparent' }
      ],
      calCells: calCells,
      events: [
        { d: '23', m: 'jun', label: 'Coleta D6 — ultrassom folicular', tag: 'Coleta', tagc: { background: '#eaf1fd', color: '#1d4ed8' }, note: 'Hoje · 08:00' },
        { d: '25', m: 'jun', label: 'Coleta D8 — ultrassom + progesterona', tag: 'Coleta', tagc: { background: '#eaf1fd', color: '#1d4ed8' }, note: 'Em 2 dias' },
        { d: '27', m: 'jun', label: 'Dosagem de progesterona (lote 3)', tag: 'Laboratório', tagc: { background: '#eef1f4', color: '#566071' }, note: '08:00 – 12:00' },
        { d: '30', m: 'jun', label: 'Entrega — relatório parcial', tag: 'Prazo', tagc: { background: '#fdf2dc', color: '#9a6a12' }, note: 'Para o orientador' }
      ],
      wizSteps: wizSteps,
      wizVars: wizVars
    };
  }

  // ----------------------------------------------------------------- render
  function screenBody() {
    switch (state.screen) {
      case 'visao': return state.profile === 'orientado' ? visaoOrientado() : visaoOrientador();
      case 'analises': return analises();
      case 'dados': return dados();
      case 'cronograma': return cronograma();
      case 'tarefas': return tarefas();
      case 'config': return config();
      default: return '';
    }
  }
  function render() {
    buildData();
    var html = '<div style="display:flex; min-height:100vh; font-family:\'IBM Plex Sans\',sans-serif; color:#1b1f27; background:#f5f7f9;">' +
      sidebar() +
      '<main style="flex:1; min-width:0; display:flex; flex-direction:column;">' +
        topbar() +
        '<div style="padding:24px 26px; flex:1;">' + screenBody() + '</div>' +
      '</main>' +
    '</div>';
    document.getElementById('app').innerHTML = html;
  }

  // ----------------------------------------------------------------- events
  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest ? e.target.closest('[data-act]') : null;
    if (!el) return;
    var act = el.getAttribute('data-act');
    if (act === 'go') state.screen = el.getAttribute('data-screen');
    else if (act === 'prof') state.profile = el.getAttribute('data-profile');
    else if (act === 'step') state.step = parseInt(el.getAttribute('data-step'), 10);
    else if (act === 'wizNext') state.step = Math.min(4, state.step + 1);
    else if (act === 'wizPrev') state.step = Math.max(0, state.step - 1);
    render();
  });

  render();
})();
</script>
</body>
