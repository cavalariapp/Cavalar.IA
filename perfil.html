<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfil · Cavalar.IA</title>
<link rel="manifest" href="manifest.webmanifest?v=2">
<meta name="theme-color" content="#080d18">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
<style>
:root {
  --bg:#080d18; --surface:#0f1623; --surface2:#141e2e; --fg:#fff; --muted:#7a8ba8;
  --border:#1c2840; --accent:#e84d0e; --accent-dim:rgba(232,77,14,.13); --accent-glow:rgba(232,77,14,.28);
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:-apple-system,system-ui,sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--fg); font-family:var(--font-body); min-height:100vh; }
.page { max-width:600px; margin:0 auto; padding-bottom:80px; }

/* Topbar */
.topbar { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; }
.brand { font-family:var(--font-display); font-size:22px; color:#fff; text-decoration:none; }
.brand .dot { color:var(--accent); }
.btn-back { background:none; border:none; color:var(--muted); font-size:13px; cursor:pointer; }
.btn-back:hover { color:var(--accent); }

/* Cover + Avatar */
.cover-wrap { position:relative; height:220px; background:linear-gradient(135deg, #1a2540, #0f1623); overflow:hidden; }
/* #cover-content precisa preencher o wrap, senão o height:100% da imagem não
   resolve (fica com altura intrínseca) e sobra um vão acima do avatar. */
#cover-content { position:absolute; inset:0; }
.cover-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
.cover-edit-btn {
  position:absolute; top:12px; right:12px;
  background:rgba(8,13,24,.8); border:1px solid var(--border); color:#fff;
  padding:7px 12px; border-radius:5px; font-size:11.5px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:6px;
}
.cover-edit-btn:hover { border-color:var(--accent); color:var(--accent); }

.profile-head { position:relative; padding:0 18px 18px; margin-top:-66px; }
.avatar-wrap {
  width:120px; height:120px; border-radius:50%;
  border:5px solid var(--bg); background:linear-gradient(135deg, var(--accent), #d44309);
  display:flex; align-items:center; justify-content:center; position:relative;
  font-family:var(--font-display); font-size:46px; font-weight:900; color:#fff;
  overflow:hidden; flex-shrink:0;
}
.avatar-img { width:100%; height:100%; object-fit:cover; }
.avatar-edit-btn {
  position:absolute; bottom:4px; right:4px;
  background:var(--accent); border:3px solid var(--bg); color:#fff;
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.avatar-edit-btn svg { width:14px; height:14px; }

.head-actions { display:flex; gap:8px; align-items:center; margin-top:14px; flex-wrap:wrap; }
.btn { background:var(--accent); color:#fff; border:none; padding:10px 18px; border-radius:5px; font-size:12px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; }
.btn:hover:not(:disabled) { background:#d44309; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-outline { background:transparent; color:var(--fg); border:1px solid var(--border); }
.btn-outline:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.btn-danger { background:transparent; color:#ff6b6b; border:1px solid #ff6b6b33; }

.profile-name { font-family:var(--font-display); font-size:30px; font-weight:900; margin-top:14px; line-height:1.1; }
.profile-bio { color:var(--muted); font-size:14px; margin-top:8px; line-height:1.5; white-space:pre-wrap; }
.profile-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
.meta-chip { background:var(--surface2); padding:4px 10px; border-radius:12px; font-size:11px; color:var(--muted); }
.meta-chip.verified { background:var(--accent-dim); color:var(--accent); font-weight:700; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid var(--border); margin:18px 18px 0; gap:0; }
.tab {
  flex:1; padding:13px 8px; text-align:center; font-size:12px; font-weight:800;
  letter-spacing:.08em; text-transform:uppercase; color:var(--muted);
  cursor:pointer; border:none; background:none; border-bottom:2px solid transparent;
  font-family:inherit;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-panel { padding:18px; display:none; }
.tab-panel.active { display:block; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px; margin-bottom:14px; }
.section-title { font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }

/* Forms */
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.input, .textarea, .select {
  width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--border);
  padding:10px 12px; border-radius:5px; font-size:14px; font-family:inherit;
}
.textarea { min-height:80px; resize:vertical; }
.input:focus, .textarea:focus, .select:focus { outline:none; border-color:var(--accent); }

/* Stats grid */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.stat-box { background:var(--bg); padding:10px 6px; border-radius:4px; text-align:center; }
.stat-val { font-size:18px; font-weight:900; color:var(--accent); }
.stat-lbl { font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:2px; }

/* Toggle */
.toggle-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; }
.toggle-label { font-size:13px; }
.toggle-switch { width:44px; height:24px; background:var(--surface2); border-radius:12px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
.toggle-switch.on { background:var(--accent); }
.toggle-switch::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:left .2s; }
.toggle-switch.on::after { left:22px; }

/* Interesses */
.interesses-list { display:flex; flex-wrap:wrap; gap:8px; }
.interesse-chip { background:var(--surface2); padding:6px 12px; border-radius:14px; font-size:12px; }
.interesse-chip b { color:var(--accent); margin-left:4px; }

/* Feed */
.compose-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:14px; }
.compose-textarea {
  width:100%; background:var(--bg); border:1px solid var(--border); color:#fff;
  padding:11px 13px; border-radius:5px; font-family:inherit; font-size:14px;
  min-height:60px; resize:vertical;
}
.compose-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; flex-wrap:wrap; gap:8px; }
.compose-tipo { display:flex; gap:6px; flex-wrap:wrap; }
.compose-tipo-chip {
  background:var(--surface2); border:1px solid var(--border); color:var(--muted);
  padding:6px 11px; border-radius:14px; font-size:11.5px; font-weight:600;
  cursor:pointer;
}
.compose-tipo-chip.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.compose-img-preview { max-width:100%; max-height:200px; border-radius:5px; margin-top:10px; display:block; }

.post-card {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:14px 16px; margin-bottom:12px;
}
.post-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.post-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--accent), #d44309); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:15px; font-weight:900; color:#fff; flex-shrink:0; overflow:hidden; }
.post-avatar img { width:100%; height:100%; object-fit:cover; }
.post-author-name { font-size:13.5px; font-weight:700; color:#fff; }
.post-author-name a { color:#fff; text-decoration:none; }
.post-author-name a:hover { color:var(--accent); }
.post-time { font-size:11px; color:var(--muted); }
.post-tipo {
  display:inline-block; font-size:9.5px; font-weight:800; letter-spacing:.08em;
  text-transform:uppercase; padding:2px 7px; border-radius:3px; margin-left:6px;
}
.post-tipo.anuncio { background:#3aa0ff22; color:#3aa0ff; }
.post-tipo.foto { background:#7c5cffaa22; color:#7c5cff; }
.post-text { font-size:14px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
.post-img { width:100%; border-radius:5px; margin-top:10px; }
.post-actions { display:flex; gap:14px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.post-action-btn { background:none; border:none; color:var(--muted); font-size:11.5px; cursor:pointer; display:flex; align-items:center; gap:5px; }
.post-action-btn:hover { color:#ff6b6b; }

.privacy-note { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.4; }
.empty { color:var(--muted); font-size:13px; text-align:center; padding:30px 14px; }
.spinner { width:36px; height:36px; border:3px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin:80px auto; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Follower stats */
.follow-stats { display:flex; gap:18px; margin-top:14px; }
.follow-stat { font-size:13px; color:var(--muted); cursor:pointer; }
.follow-stat b { color:var(--fg); font-weight:700; }
.follow-stat:hover b { color:var(--accent); }

/* Compose: visibility selector */
.compose-vis { display:flex; gap:6px; margin-top:8px; }
.compose-vis-chip {
  background:var(--surface2); border:1px solid var(--border); color:var(--muted);
  padding:5px 10px; border-radius:12px; font-size:10.5px; font-weight:700;
  cursor:pointer; text-transform:uppercase; letter-spacing:.06em;
}
.compose-vis-chip.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

/* Likes/comments */
.post-stats { display:flex; gap:14px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); align-items:center; }
.post-stat-btn {
  background:none; border:none; color:var(--muted); font-size:12.5px;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  padding:3px 0; font-family:inherit;
}
.post-stat-btn:hover { color:var(--accent); }
.post-stat-btn.liked { color:#ff4a6b; }
.post-stat-btn.liked:hover { color:#ff4a6b; }
.post-stat-btn svg { width:16px; height:16px; }

.post-comments { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:none; }
.post-comments.open { display:block; }
.comment-item { display:flex; gap:8px; margin-bottom:8px; align-items:flex-start; }
.comment-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#d44309); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:#fff; flex-shrink:0; overflow:hidden; }
.comment-avatar img { width:100%; height:100%; object-fit:cover; }
.comment-bubble { background:var(--surface2); padding:7px 11px; border-radius:14px; font-size:12.5px; line-height:1.4; flex:1; word-break:break-word; }
.comment-bubble b { font-weight:700; margin-right:4px; }
.comment-bubble b a { color:#fff; text-decoration:none; }
.comment-time { font-size:10px; color:var(--muted); margin-top:2px; padding-left:11px; }
.comment-del { background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; padding:0 4px; }
.comment-del:hover { color:#ff6b6b; }
.comment-input-wrap { display:flex; gap:8px; align-items:center; margin-top:6px; }
.comment-input {
  flex:1; background:var(--bg); border:1px solid var(--border); color:#fff;
  border-radius:14px; padding:7px 12px; font-size:12.5px; font-family:inherit; outline:none;
}
.comment-input:focus { border-color:var(--accent); }
.comment-send-btn {
  background:var(--accent); color:#fff; border:none; border-radius:14px;
  padding:7px 12px; font-size:11px; font-weight:700; cursor:pointer;
}

/* DM button */
.btn-dm { background:transparent; color:var(--accent); border:1px solid var(--accent); padding:10px 14px; border-radius:5px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; cursor:pointer; }
.btn-dm:hover { background:var(--accent-dim); }

/* Chips editáveis (tipos + interesses) */
.edit-chip {
  background: var(--surface2); color: var(--fg); border: 1px solid var(--border);
  padding: 8px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 600;
  cursor: pointer; user-select: none; transition: all .15s;
  display: inline-block;
}
.edit-chip:hover { border-color: var(--accent-glow); }
.edit-chip.active {
  background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
}
.edit-pergunta-box { margin-bottom: 14px; }
.edit-pergunta-q { font-family: var(--font-display); font-size: 16px; margin-bottom: 8px; }
.edit-pergunta-opts { display: flex; gap: 8px; flex-wrap: wrap; }
.edit-pergunta-opts .edit-chip { flex: 1; text-align: center; min-width: 110px; padding: 11px 10px; }

/* Crop modal */
.crop-modal {
  position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:1000;
  display:none; align-items:center; justify-content:center; padding:14px;
}
.crop-modal.open { display:flex; }
.crop-modal-inner {
  background:var(--surface); border-radius:8px; padding:18px;
  max-width:480px; width:100%;
}
.crop-modal-title { font-family:var(--font-display); font-size:20px; font-weight:900; margin-bottom:12px; }
.crop-img-wrap { max-height:60vh; overflow:hidden; background:#000; border-radius:5px; }
.crop-img-wrap img { display:block; max-width:100%; }
.crop-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }

.contact-line { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:13.5px; }
.contact-line a { color:var(--accent); text-decoration:none; }
.contact-line a:hover { text-decoration:underline; }
.contact-private { color:var(--muted); font-size:12px; }

.row-actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }

/* ── Análise de desempenho (card destacado) ── */
.analise-card {
  background:linear-gradient(160deg, var(--surface2), var(--surface));
  border:1px solid var(--accent-glow);
}
.analise-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:14px; }
.analise-filtros {
  font-size:11px; color:var(--accent); font-weight:700; letter-spacing:.02em;
  display:inline-flex; align-items:center; gap:5px;
}
.analise-cavalos-line { margin-top:12px; font-size:11.5px; color:var(--muted); line-height:1.5; }
.analise-link {
  display:inline-block; margin-top:12px; font-size:12px; font-weight:700;
  color:var(--accent); text-decoration:none;
}
.analise-link:hover { text-decoration:underline; }
.stat-box .stat-sub { font-size:9px; color:var(--muted); margin-top:1px; }

/* ── Cavalos do criador/proprietário ── */
.cavalo-card {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:14px; margin-bottom:10px;
}
.cavalo-card-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
.cavalo-nome { font-family:var(--font-display); font-size:18px; font-weight:900; line-height:1; }
.cavalo-rel {
  font-size:9.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase;
  padding:3px 8px; border-radius:10px; white-space:nowrap;
}
.cavalo-rel.criador { background:#7c5cff22; color:#a48bff; }
.cavalo-rel.proprietario { background:#3aa0ff22; color:#5db4ff; }
.cavalo-stats-mini { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.cavalo-stat { background:var(--surface); border-radius:5px; padding:8px 4px; text-align:center; }
.cavalo-stat .v { font-size:15px; font-weight:900; color:var(--accent); }
.cavalo-stat .l { font-size:8.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
.cavalo-riders { margin-top:9px; font-size:11px; color:var(--muted); line-height:1.4; }
.cavalo-remove {
  background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer;
  padding:0 4px; line-height:1;
}
.cavalo-remove:hover { color:#ff6b6b; }
.mini-spin { width:18px; height:18px; border:2px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; display:inline-block; vertical-align:middle; }

/* ── Autocomplete de cavalos ── */
.ac-wrap { position:relative; }
.ac-drop {
  position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:50;
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  max-height:260px; overflow-y:auto; box-shadow:0 12px 32px rgba(0,0,0,.5);
  display:none;
}
.ac-drop.open { display:block; }
.ac-item {
  padding:10px 13px; font-size:13.5px; cursor:pointer;
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  border-bottom:1px solid var(--border);
}
.ac-item:last-child { border-bottom:none; }
.ac-item:hover, .ac-item.active { background:var(--accent-dim); }
.ac-item .ac-nome { font-weight:600; }
.ac-item .ac-count { font-size:10.5px; color:var(--muted); white-space:nowrap; }
.ac-empty { padding:12px 13px; font-size:12.5px; color:var(--muted); text-align:center; }

/* ── Filtros de análise (edit) ── */
.filtro-group { margin-bottom:16px; }
.filtro-group > .filtro-lbl {
  font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); margin-bottom:8px; display:block;
}
.chip-row { display:flex; flex-wrap:wrap; gap:7px; }
.fchip {
  background:var(--surface2); color:var(--fg); border:1px solid var(--border);
  padding:7px 13px; border-radius:16px; font-size:12px; font-weight:600;
  cursor:pointer; user-select:none; transition:all .12s;
}
.fchip:hover { border-color:var(--accent-glow); }
.fchip.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.fchip.mes { min-width:46px; text-align:center; padding:7px 9px; }
.rel-toggle { display:flex; gap:7px; margin-bottom:8px; }

/* Hide file inputs */
input[type=file] { display:none; }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="index.html" class="brand">CAVALAR<span class="dot">.</span>IA</a>
    <button class="btn-back" onclick="history.length>1 ? history.back() : (location.href='index.html')">← Voltar</button>
  </div>

  <div id="loading" class="spinner"></div>
  <div id="content" style="display:none">
    <!-- COVER + AVATAR -->
    <div class="cover-wrap" id="cover-wrap">
      <div id="cover-content"></div>
      <button class="cover-edit-btn" id="cover-edit-btn" style="display:none" onclick="document.getElementById('cover-file').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Trocar capa
      </button>
      <input type="file" id="cover-file" accept="image/*">
    </div>

    <div class="profile-head">
      <div class="avatar-wrap" id="avatar-wrap">
        <div id="avatar-content"></div>
        <button class="avatar-edit-btn" id="avatar-edit-btn" style="display:none" onclick="document.getElementById('avatar-file').click()" title="Trocar foto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <input type="file" id="avatar-file" accept="image/*">
      </div>
      <div class="head-actions" id="head-actions"></div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-bio" id="profile-bio"></div>
      <div class="profile-meta" id="profile-meta"></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="sobre" onclick="setTab('sobre')">Sobre</button>
      <button class="tab" data-tab="feed" onclick="setTab('feed')">Feed</button>
      <!-- Aba Criação: só aparece pra perfis "criador" (atualizarAbas decide) -->
      <button class="tab" data-tab="criador" id="tab-criador" onclick="setTab('criador')" style="display:none">Criação</button>
    </div>

    <!-- TAB: SOBRE -->
    <div class="tab-panel active" id="panel-sobre"></div>

    <!-- TAB: FEED -->

const ANO_ATUAL   = new Date().getFullYear();

// É criador ou proprietário? (mostra a seção "Meus cavalos")

];

// Converte analise_config → params do RPC stats_cavaleiro_filtrado
function filtrosAnalise(nome, cfg) {
  cfg = cfg || {};
  return {
    nome_input:    nome,
    ano_input:     Number.isInteger(cfg.ano) ? cfg.ano : null,
    meses_input:   (Array.isArray(cfg.meses)   && cfg.meses.length)   ? cfg.meses   : null,
    cavalos_input: (Array.isArray(cfg.cavalos) && cfg.cavalos.length) ? cfg.cavalos : null,
  };
}

// Texto-resumo dos filtros ativos (ex.: "2026 · Jan, Fev · 3 cavalos")
function resumoFiltros(cfg) {
  cfg = cfg || {};
  const partes = [];
  partes.push(Number.isInteger(cfg.ano) ? String(cfg.ano) : 'Todos os anos');
  if (Array.isArray(cfg.meses) && cfg.meses.length && cfg.meses.length < 12) {
    partes.push(cfg.meses.slice().sort((a,b)=>a-b).map(m => MESES_ABREV[m-1]).join(', '));
  } else {
    partes.push('Todos os meses');
  }
  if (Array.isArray(cfg.cavalos) && cfg.cavalos.length) {
    partes.push(`${cfg.cavalos.length} ${cfg.cavalos.length === 1 ? 'cavalo' : 'cavalos'}`);
  } else {
    partes.push('Todos os cavalos');
  }
  return partes.join(' · ');
}

async function carregar() {
  const params = new URLSearchParams(window.location.search);
  const userIdParam = params.get('u');
  const startEdit = params.get('edit') === '1';

  const { data: { session } } = await sb.auth.getSession();
  _meuId = session?.user?.id || null;
  _alvoId = userIdParam || _meuId;

  if (!_alvoId) {
    window.location.href = 'login.html';
    return;
  }

  _ehProprio = _meuId && (_meuId === _alvoId);

  // Próprio perfil: RPC SECURITY DEFINER traz tudo (inclui email/celular/idade).
  // Outros: view profiles_publicos (não traz dados sensíveis).
  let profile, error;
  if (_ehProprio) {
    ({ data: profile, error } = await sb.rpc('meu_perfil'));
  } else {
    ({ data: profile, error } = await sb.from('profiles_publicos').select('*').eq('id', _alvoId).single());
  }
  if (error || !profile) {
    $('loading').style.display = 'none';
    $('content').style.display = 'block';
    document.querySelector('.profile-head').innerHTML = _ehProprio
      ? `<div class="empty">Seu perfil ainda não foi criado.<br><a href="cadastro.html" style="color:var(--accent)">Completar cadastro</a></div>`
      : `<div class="empty">Perfil não encontrado ou privado.</div>`;
    return;
  }
  _profile = profile;

  _analiseConfig = profile.analise_config || {};
  const aVisivel = _analiseConfig.visivel !== false; // default: visível

  const [interessesRes, statsRes, followersRes, followingRes, eusigoRes, cavalosRes, animaisRes, solicRes] = await Promise.all([
    sb.from('profile_interesses').select('pergunta_id, resposta').eq('profile_id', _alvoId),
    (profile.cavaleiro_nome && aVisivel)
      ? sb.rpc('stats_cavaleiro_filtrado', filtrosAnalise(profile.cavaleiro_nome, _analiseConfig)).then(r => r.data?.[0])
      : Promise.resolve(null),
    // Contadores: só follows ACEITOS contam (pendentes ainda não são seguidores)
    sb.from('follows').select('*', { count: 'exact', head: true }).eq('followed_id', _alvoId).eq('status', 'aceito'),
    sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', _alvoId).eq('status', 'aceito'),
    // Meu vínculo com o alvo: traz o status (aceito | pendente) se existir
    _meuId && !_ehProprio
      ? sb.from('follows').select('status').eq('follower_id', _meuId).eq('followed_id', _alvoId).maybeSingle()
      : Promise.resolve({ data: null }),
    sb.from('profile_cavalos').select('*').eq('profile_id', _alvoId).order('criado_em', { ascending: true }),
    sb.from('criador_animais').select('*').eq('profile_id', _alvoId).order('criado_em', { ascending: true }),
    // Solicitações pendentes ao MEU perfil (só quando vejo meu próprio perfil)
    _ehProprio
      ? sb.from('follows').select('follower_id, criado_em').eq('followed_id', _alvoId).eq('status', 'pendente').order('criado_em', { ascending: false })
      : Promise.resolve({ data: [] }),
  ]);
  _interesses = interessesRes.data || [];
  _stats = statsRes || null;
  _followersCount = followersRes.count || 0;
  _followingCount = followingRes.count || 0;
  _isFollowing    = eusigoRes.data?.status === 'aceito';
  _followPendente = eusigoRes.data?.status === 'pendente';
  _meusCavalos = cavalosRes.data || [];
  _meusAnimais = animaisRes.data || [];

  // Enriquece as solicitações com nome/avatar do solicitante (view pública)
  _solicitacoes = [];
  const pendentes = solicRes.data || [];
  if (_ehProprio && pendentes.length) {
    const ids = pendentes.map(r => r.follower_id);
    const { data: profs } = await sb.from('profiles_publicos').select('id,nome_completo,avatar_url').in('id', ids);
    const pmap = new Map((profs || []).map(p => [p.id, p]));
    _solicitacoes = pendentes.map(r => ({ ...r, prof: pmap.get(r.follower_id) || {} }));
  }

  // Perfil privado de outra pessoa que eu não sigo (aceito) → só pra seguidores.
  _bloqueado = !_ehProprio && profile.visibilidade === 'privado' && !_isFollowing;

  $('loading').style.display = 'none';
  $('content').style.display = 'block';

  if (_ehProprio && startEdit) _editMode = true;

  renderAll();
  iniciarRealtimePerfil();   // solicitações/seguidores em tempo real
}

function statsGridHtml(s) {
  const pct = (n) => (s.total_participacoes || 0) > 0 ? Math.round((n / s.total_participacoes) * 100) : 0;
  return `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${s.total_participacoes || 0}</div><div class="stat-lbl">Particip.</div><div class="stat-sub">${s.total_provas || 0} provas</div></div>
      <div class="stat-box"><div class="stat-val">${pct(s.zeros || 0)}%</div><div class="stat-lbl">Zeros</div><div class="stat-sub">${s.zeros || 0}×</div></div>
      <div class="stat-box"><div class="stat-val">${pct(s.vitorias || 0)}%</div><div class="stat-lbl">Vitórias</div><div class="stat-sub">${s.vitorias || 0}×</div></div>
      <div class="stat-box"><div class="stat-val">${pct(s.top6 || 0)}%</div><div class="stat-lbl">Top 6</div><div class="stat-sub">${s.top6 || 0}×</div></div>
    </div>`;
}

function statsCardCavaleiroHtml() {
  if (!_stats) return ''; // não é cavaleiro vinculado OU análise oculta
  const s = _stats;
  const temResultados = (s.total_participacoes || 0) > 0;
  let inner;
  if (temResultados) {
    inner = `
      ${statsGridHtml(s)}
      ${s.cavalos?.length ? `<div class="analise-cavalos-line">🐎 <b style="color:var(--fg);font-weight:600">Conjuntos:</b> ${s.cavalos.slice(0, 10).map(esc).join(' · ')}${s.cavalos.length > 10 ? ` <span style="opacity:.7">+${s.cavalos.length - 10}</span>` : ''}</div>` : ''}
      <a class="analise-link" href="resultados.html?cavaleiro=${encodeURIComponent(s.cavaleiro_nome)}">Ver todos os resultados →</a>`;
  } else {

async function carregarStatsCavalos() {
  for (const c of _meusCavalos) {
    const box = $(`cav-stats-${c.id}`);
    if (!box) continue;
    const key = c.cavalo_nome.toLowerCase();
    let s;
    if (key in _cavaloStats) {
      s = _cavaloStats[key];
    } else {
      const { data } = await sb.rpc('stats_cavalo', { cavalo_input: c.cavalo_nome });
      s = data?.[0] || null;
      _cavaloStats[key] = s;
    }
    const box2 = $(`cav-stats-${c.id}`);
    if (!box2) continue;
    if (!s || (s.total_participacoes || 0) === 0) {
      box2.innerHTML = `<div style="font-size:11.5px;color:var(--muted)">Ainda sem resultados registrados para este cavalo.</div>`;
      continue;
    }
    const pct = (n) => s.total_participacoes > 0 ? Math.round((n / s.total_participacoes) * 100) : 0;
    box2.innerHTML = `
      <div class="cavalo-stats-mini">
        <div class="cavalo-stat"><div class="v">${s.total_participacoes}</div><div class="l">Particip.</div></div>
        <div class="cavalo-stat"><div class="v">${pct(s.zeros)}%</div><div class="l">Zeros</div></div>
        <div class="cavalo-stat"><div class="v">${pct(s.vitorias)}%</div><div class="l">Vitórias</div></div>
        <div class="cavalo-stat"><div class="v">${pct(s.top6)}%</div><div class="l">Top 6</div></div>
      </div>
      ${s.cavaleiros?.length ? `<div class="cavalo-riders">🏇 ${s.cavaleiros.slice(0, 5).map(esc).join(' · ')}${s.cavaleiros.length > 5 ? ` <span style="opacity:.7">+${s.cavaleiros.length - 5}</span>` : ''}</div>` : ''}
      <a class="analise-link" style="margin-top:8px;font-size:11.5px" href="resultados.html?cavalo=${encodeURIComponent(c.cavalo_nome)}">Ver resultados →</a>`;
  }
}

function wireEdit() {
  let visibilidade = _profile.visibilidade;
  // Cópia dos tipos atuais — mutada pelos clicks
  let tiposAtuais = [...(_profile.tipos || [])];

  // Cards extras (só existem se aplicáveis)
  wireAnaliseConfig();
  wireCavalosEdit();

  const tog = $('e-toggle-publico');
  tog.onclick = () => {
    visibilidade = visibilidade === 'publico' ? 'privado' : 'publico';
    tog.classList.toggle('on', visibilidade === 'publico');
  };

  // Toggle dos chips de TIPOS
  document.querySelectorAll('.edit-tipos-chips .edit-chip').forEach(c => {
    c.onclick = () => {
      const t = c.dataset.tipo;
      c.classList.toggle('active');
      if (c.classList.contains('active')) {
        if (!tiposAtuais.includes(t)) tiposAtuais.push(t);
      } else {
        tiposAtuais = tiposAtuais.filter(x => x !== t);
      }
    };
  });

  // Toggle dos chips de INTERESSES (5 grupos)
  // Mutate _interesses array localmente: clica numa opção → seleciona;
  // clica na opção JÁ ativa → desmarca (remove)
  document.querySelectorAll('.edit-pergunta-opts').forEach(grupo => {
    const pid = grupo.dataset.pid;
    grupo.querySelectorAll('.edit-chip').forEach(chip => {
      chip.onclick = () => {
        const resposta = chip.dataset.resposta;
        const jaAtiva = chip.classList.contains('active');
        // limpa todas do grupo
        grupo.querySelectorAll('.edit-chip').forEach(c => c.classList.remove('active'));
        // remove a pergunta atual do array local
        _interesses = _interesses.filter(i => i.pergunta_id !== pid);
        if (!jaAtiva) {
          // ativa essa opção + adiciona ao array
          chip.classList.add('active');
          _interesses.push({ pergunta_id: pid, resposta });
        }
      };
    });
  });

  $('btn-salvar').onclick = async () => {
    const btn = $('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando…';
    const nomeNovo = $('e-nome').value.trim();
    if (nomeNovo.length < 3) { alert('Nome muito curto'); btn.disabled = false; btn.textContent = 'Salvar alterações'; return; }
    const updates = {
      nome_completo: nomeNovo,
      bio: $('e-bio').value.trim() || null,
      instagram: $('e-instagram').value.trim() || null,
      website: $('e-website').value.trim() || null,
      estado: $('e-estado').value.trim().toUpperCase() || null,
      tipos: tiposAtuais,
      visibilidade,
    };
    const { error } = await sb.from('profiles').update(updates).eq('id', _profile.id);
    if (error) {
      alert('Erro ao salvar: ' + error.message);
      btn.disabled = false; btn.textContent = 'Salvar alterações';
      return;
    }
    // Atualiza state local + sai do modo edição
    Object.assign(_profile, updates);
    _editMode = false;
    btn.textContent = '✓ Salvo';
    setTimeout(() => renderAll(), 600);
  };

  // Salvar interesses (botão separado pra dar feedback rápido)
  const btnInt = $('btn-salvar-interesses');
  if (btnInt) {
    btnInt.onclick = async () => {
      btnInt.disabled = true;
      btnInt.textContent = 'Salvando…';
      // Apaga todas e re-insere — mais simples que diff
      const { error: delErr } = await sb.from('profile_interesses').delete().eq('profile_id', _profile.id);
      if (delErr) {
        alert('Erro: ' + delErr.message);
        btnInt.disabled = false; btnInt.textContent = 'Salvar interesses';
        return;
      }
      if (_interesses.length) {
        const rows = _interesses.map(i => ({
          profile_id: _profile.id,
          pergunta_id: i.pergunta_id,
          resposta: i.resposta,
        }));
        const { error: insErr } = await sb.from('profile_interesses').insert(rows);
        if (insErr) {
          alert('Erro: ' + insErr.message);
          btnInt.disabled = false; btnInt.textContent = 'Salvar interesses';
          return;
        }
      }
      $('ok-interesses').textContent = '✓ Interesses salvos';
      btnInt.disabled = false; btnInt.textContent = 'Salvar interesses';
      setTimeout(() => { $('ok-interesses').textContent = ''; }, 2500);
    };
  }
}

// ═══ ANÁLISE DE RESULTADOS (config do cavaleiro) ═══════════════
// Card de VINCULAR meu nome de cavaleiro/amazona aos resultados (perfil próprio).
// Quem não vinculou no cadastro (ex.: não havia resultados na época / backfill novo)
// pode reivindicar aqui: busca o nome nos resultados e confirma que é você → suas
// estatísticas passam a aparecer e outros te acham pelos resultados.
let _vincNomes = [];
let _vincTimer = null;
function vincularCavaleiroCardHtml() {
  const atual = _profile.cavaleiro_nome;
  return `
    <div class="card">
      <div class="section-title">Sou cavaleiro / amazona</div>
      <p class="privacy-note" style="margin-top:-4px;margin-bottom:12px">
        Vincule seu nome como ele aparece nos <b>resultados das provas</b> pra trazer
        suas estatísticas pra cá. Confirme só se for realmente você.</p>
      ${atual ? `<div style="margin-bottom:12px;font-size:14px">Vinculado a:
        <b style="color:var(--accent)">${esc(atual)}</b>
        <button class="btn btn-outline" style="margin-left:8px;padding:5px 12px;font-size:12px" onclick="desvincularCavaleiro()">Desvincular</button></div>` : ''}
      <div class="field" style="margin-bottom:0">
        <label>${atual ? 'Trocar' : 'Buscar'} meu nome nos resultados</label>
        <input id="vinc-search" class="input" placeholder="Digite seu nome…" autocomplete="off" oninput="vincBuscar(this.value)">
      </div>
      <div id="vinc-results" style="display:flex;flex-direction:column;gap:6px;margin-top:8px"></div>
    </div>`;
}
function vincBuscar(termo) {
  clearTimeout(_vincTimer);
  const box = document.getElementById('vinc-results');
  if (!box) return;
  const t = (termo || '').trim();
  if (t.length < 2) { box.innerHTML = ''; return; }
  _vincTimer = setTimeout(async () => {
    try {
      const { data } = await sb.rpc('buscar_nomes_cavaleiros', { termo: t });
      _vincNomes = [...new Set((data || []).map(r => (r.nome || '').split('\n')[0].trim()).filter(Boolean))].slice(0, 25);
      box.innerHTML = _vincNomes.length
        ? _vincNomes.map((n, i) => `<button class="btn btn-outline" style="text-align:left;justify-content:flex-start;font-weight:600" onclick="vincularCavaleiro(${i})">${esc(n)}</button>`).join('')
        : '<div class="privacy-note">Nenhum cavaleiro com esse nome nos resultados.</div>';
    } catch (e) { box.innerHTML = '<div class="privacy-note">Erro na busca. Tente de novo.</div>'; }
  }, 250);
}
async function vincularCavaleiro(i) {
  const nome = _vincNomes[i];
  if (!_profile || !nome) return;
  if (!confirm(`Confirmar que VOCÊ é "${nome}" nos resultados?\n\nSuas estatísticas dessas provas passarão a aparecer no seu perfil.`)) return;
  const { error } = await sb.from('profiles')
    .update({ cavaleiro_nome: nome, cavaleiro_match_confirmado: true }).eq('id', _profile.id);
  if (error) { alert('Erro ao vincular: ' + error.message); return; }
  location.reload();
}
async function desvincularCavaleiro() {
  if (!_profile) return;
  if (!confirm('Desvincular seu nome dos resultados? Suas estatísticas deixarão de aparecer.')) return;
  const { error } = await sb.from('profiles')
    .update({ cavaleiro_nome: null, cavaleiro_match_confirmado: false }).eq('id', _profile.id);
  if (error) { alert('Erro: ' + error.message); return; }
  location.reload();
}

          <div class="chip-row" id="cfg-meses">${mesChips}</div>

async function wireAnaliseConfig() {
  const card = $('analise-config-card');
  if (!card) return;

  const tog = $('cfg-toggle-visivel');
  const filtros = $('cfg-filtros');
  tog.onclick = () => {
    _cfgEdit.visivel = !_cfgEdit.visivel;
    tog.classList.toggle('on', _cfgEdit.visivel);
    filtros.style.opacity = _cfgEdit.visivel ? '' : '.4';
    filtros.style.pointerEvents = _cfgEdit.visivel ? '' : 'none';
  };

  // Ano — seleção única
  $('cfg-anos').querySelectorAll('.fchip').forEach(c => {
    c.onclick = () => {
      $('cfg-anos').querySelectorAll('.fchip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      _cfgEdit.ano = c.dataset.ano === 'todos' ? null : parseInt(c.dataset.ano);
    };
  });

  // Meses — múltipla seleção (+ "Todos" limpa)
  $('cfg-meses').querySelectorAll('.fchip').forEach(c => {
    c.onclick = () => {
      if (c.dataset.mes === 'todos') {
        _cfgEdit.meses = [];
      } else {
        const m = parseInt(c.dataset.mes);
        if (_cfgEdit.meses.includes(m)) _cfgEdit.meses = _cfgEdit.meses.filter(x => x !== m);
        else _cfgEdit.meses.push(m);
      }
      syncMesesChips();
    };
  });

  $('btn-salvar-analise').onclick = salvarAnalise;

  // Carrega lista de cavalos do cavaleiro pro picker
  const cavalos = await getTodosCavalos();
  renderCfgCavalosChips(cavalos);
}

function syncMesesChips() {
  const box = $('cfg-meses');
  if (!box) return;
  const todos = _cfgEdit.meses.length === 0;
  box.querySelectorAll('.fchip').forEach(c => {
    if (c.dataset.mes === 'todos') c.classList.toggle('active', todos);
    else c.classList.toggle('active', _cfgEdit.meses.includes(parseInt(c.dataset.mes)));
  });
}

function renderCfgCavalosChips(cavalos) {
  const box = $('cfg-cavalos');
  if (!box) return;
  if (!cavalos.length) {
    box.innerHTML = `<span style="font-size:12px;color:var(--muted)">Nenhum cavalo encontrado nos seus resultados.</span>`;
    return;
  }
  const low = () => _cfgEdit.cavalos.map(x => x.toLowerCase());
  const todos = _cfgEdit.cavalos.length === 0;
  box.innerHTML = `<span class="fchip${todos ? ' active' : ''}" data-cav="__todos">Todos os cavalos</span>` +
    cavalos.map(nm => `<span class="fchip${low().includes(nm.toLowerCase()) ? ' active' : ''}" data-cav="${esc(nm)}">${esc(nm)}</span>`).join('');
  box.querySelectorAll('.fchip').forEach(c => {
    c.onclick = () => {
      const v = c.dataset.cav;
      if (v === '__todos') {
        _cfgEdit.cavalos = [];
      } else {
        const ex = _cfgEdit.cavalos.find(x => x.toLowerCase() === v.toLowerCase());
        if (ex) _cfgEdit.cavalos = _cfgEdit.cavalos.filter(x => x.toLowerCase() !== v.toLowerCase());
        else _cfgEdit.cavalos.push(v);
      }
      const todosNow = _cfgEdit.cavalos.length === 0;
      box.querySelectorAll('.fchip').forEach(x => {
        if (x.dataset.cav === '__todos') x.classList.toggle('active', todosNow);
        else x.classList.toggle('active', low().includes(x.dataset.cav.toLowerCase()));
      });
    };
  });
}

async function getTodosCavalos() {
  if (_todosCavalos) return _todosCavalos;
  if (!_profile.cavaleiro_nome) { _todosCavalos = []; return []; }
  const { data } = await sb.rpc('stats_cavaleiro_filtrado', {
    nome_input: _profile.cavaleiro_nome, ano_input: null, meses_input: null, cavalos_input: null,
  });
  _todosCavalos = (data?.[0]?.cavalos) || [];
  return _todosCavalos;
}

async function salvarAnalise() {
  const btn = $('btn-salvar-analise');
  btn.disabled = true; btn.textContent = 'Salvando…';
  const cfg = {
    visivel: _cfgEdit.visivel,
    ano:     _cfgEdit.ano,
    meses:   _cfgEdit.meses.slice().sort((a, b) => a - b),
    cavalos: _cfgEdit.cavalos.slice(),
  };
  const { error } = await sb.from('profiles').update({ analise_config: cfg }).eq('id', _profile.id);
  if (error) { alert('Erro: ' + error.message); btn.disabled = false; btn.textContent = 'Salvar análise'; return; }
  _profile.analise_config = cfg;
  _analiseConfig = cfg;
  await recarregarStatsCavaleiro();
  $('ok-analise').textContent = '✓ Análise salva — já aparece no seu perfil';
  btn.disabled = false; btn.textContent = 'Salvar análise';
  setTimeout(() => { const o = $('ok-analise'); if (o) o.textContent = ''; }, 3000);
}

async function recarregarStatsCavaleiro() {
  if (!_profile.cavaleiro_nome || _analiseConfig.visivel === false) { _stats = null; return; }
  const { data } = await sb.rpc('stats_cavaleiro_filtrado', filtrosAnalise(_profile.cavaleiro_nome, _analiseConfig));
  _stats = data?.[0] || null;
}

function wireCavalosEdit() {

  const drop = $('cav-drop');

  const renderAcDrop = () => {
    acActive = -1;
    if (!acItems.length) {
      drop.innerHTML = `<div class="ac-empty">Nenhum cavalo com resultados encontrado.</div>`;
      drop.classList.add('open');
      return;

    drop.innerHTML = acItems.map((it, i) => `

      </div>`).join('');
    drop.querySelectorAll('.ac-item').forEach(el => {
      el.onclick = () => selecionarCavalo(acItems[parseInt(el.dataset.i)].nome);
    });
    drop.classList.add('open');
  };
  const marcaAc = () => {
    drop.querySelectorAll('.ac-item').forEach((el, i) => el.classList.toggle('active', i === acActive));
  };

  input.addEventListener('input', () => {
    clearTimeout(acTimer);
    const termo = input.value.trim();
    if (termo.length < 2) { drop.classList.remove('open'); drop.innerHTML = ''; acItems = []; return; }
    acTimer = setTimeout(async () => {
      const { data } = await sb.rpc('buscar_cavalos', { termo });
      acItems = data || [];
      renderAcDrop();
    }, 280);
  });
  input.addEventListener('keydown', (e) => {
    if (!drop.classList.contains('open')) return;
    if (e.key === 'ArrowDown')      { e.preventDefault(); acActive = Math.min(acActive + 1, acItems.length - 1); marcaAc(); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); acActive = Math.max(acActive - 1, 0); marcaAc(); }
    else if (e.key === 'Enter')     { e.preventDefault(); if (acActive >= 0 && acItems[acActive]) selecionarCavalo(acItems[acActive].nome); }
    else if (e.key === 'Escape')    { drop.classList.remove('open'); }
  });
  document.addEventListener('click', (e) => { if (!card.contains(e.target)) drop.classList.remove('open'); });

  _acClear = () => { input.value = ''; drop.classList.remove('open'); drop.innerHTML = ''; };
  renderMeusCavalosList();
}

async function selecionarCavalo(nome) {
  if (!_meuId || !_ehProprio) return;
  nome = (nome || '').trim();
  if (!nome) return;
  // Já existe com essa relação?
  if (_meusCavalos.some(c => c.cavalo_nome.toLowerCase() === nome.toLowerCase() && c.relacao === _relSelecionada)) {
    if (_acClear) _acClear();
    return;
  }
  const { data, error } = await sb.from('profile_cavalos')
    .insert({ profile_id: _meuId, cavalo_nome: nome, relacao: _relSelecionada })
    .select().single();
  if (error) { alert('Erro ao adicionar: ' + error.message); return; }
  _meusCavalos.push(data);
  if (_acClear) _acClear();
  renderMeusCavalosList();
}

function renderMeusCavalosList() {
  const box = $('meus-cavalos-list');
  if (!box) return;
  if (!_meusCavalos.length) {
    box.innerHTML = `<div style="font-size:12.5px;color:var(--muted)">Nenhum cavalo adicionado ainda.</div>`;
    return;
  }
  box.innerHTML = _meusCavalos.map(c => {
    const relLbl = c.relacao === 'criador' ? 'Criação' : 'Proprietário';
    const relCls = c.relacao === 'criador' ? 'criador' : 'proprietario';
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:9px;min-width:0;flex-wrap:wrap">
          <span style="font-weight:600;font-size:13.5px">${esc(c.cavalo_nome)}</span>
          <span class="cavalo-rel ${relCls}" onclick="trocarRelacao(${c.id})" title="Clique para alternar Proprietário / Criação" style="cursor:pointer">${relLbl} ⇄</span>
        </div>
        <button class="cavalo-remove" onclick="removerCavalo(${c.id})" title="Remover">×</button>
      </div>`;
  }).join('');
}

async function removerCavalo(id) {
  if (!confirm('Remover este cavalo do seu perfil?')) return;
  const { error } = await sb.from('profile_cavalos').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  _meusCavalos = _meusCavalos.filter(c => c.id !== id);
  if (_editMode) renderMeusCavalosList();
  else renderSobre();
}

// Alterna proprietário ⇄ criação de um cavalo já salvo.
// RLS de profile_cavalos só tem INSERT/DELETE/SELECT (sem UPDATE),
// então a troca é feita via delete + insert da nova relação.
async function trocarRelacao(id) {
  if (!_ehProprio) return;
  const c = _meusCavalos.find(x => x.id === id);
  if (!c) return;
  const nova = c.relacao === 'criador' ? 'proprietario' : 'criador';
  // Se o mesmo cavalo já existe com a relação destino, só descarta a duplicata.
  const jaTem = _meusCavalos.some(x => x.id !== id
    && x.cavalo_nome.toLowerCase() === c.cavalo_nome.toLowerCase()
    && x.relacao === nova);
  const { error: delErr } = await sb.from('profile_cavalos').delete().eq('id', id);
  if (delErr) { alert('Erro: ' + delErr.message); return; }
  _meusCavalos = _meusCavalos.filter(x => x.id !== id);
  if (!jaTem) {
    const { data, error } = await sb.from('profile_cavalos')
      .insert({ profile_id: _meuId, cavalo_nome: c.cavalo_nome, relacao: nova })
      .select().single();
    if (error) { alert('Erro: ' + error.message); return; }
    _meusCavalos.push(data);
  }
  if (_editMode) renderMeusCavalosList();
  else renderSobre();
}

// ═══ ÁREA DO CRIADOR (matrizes / garanhões / produtos) ═════════
// Aba própria "Criação". O dono vê o formulário + os cards (autogerencia);
// o visitante vê só os cards (somente leitura).
function renderCriador() {
  const panel = $('panel-criador');
  if (!panel) return;
  if (_bloqueado) {
    panel.innerHTML = `<div class="empty">🔒 A Área do Criador é só para seguidores.</div>`;
    return;
  }
  if (!ehCriador(_profile)) {
    panel.innerHTML = `<div class="empty">Este perfil não tem Área do Criador.</div>`;
    return;
  }
  let html = '';
  if (_ehProprio) html += areaCriadorFormHtml();
  html += `<div id="criador-cards"></div>`;
  panel.innerHTML = html;
  if (_ehProprio) wireAreaCriador();
  renderCriadorCards();
}

// Renderiza só os cards de animais (agrupados por tipo). Re-renderizável
// isoladamente — não toca no formulário, preservando o que o dono digita.
function renderCriadorCards() {
  const box = $('criador-cards');
  if (!box) return;
  if (!_meusAnimais.length) {
    box.innerHTML = `<div class="empty">${_ehProprio ? 'Você ainda não cadastrou nenhum animal. Use o formulário acima.' : 'Nenhum animal cadastrado ainda.'}</div>`;
    return;
  }
  box.innerHTML = ANIMAL_GRUPOS.map(g => {
    const itens = _meusAnimais.filter(a => a.tipo === g.tipo);
    if (!itens.length) return '';
    return `
      <div style="margin-bottom:18px">
        <div class="section-title" style="margin-bottom:10px">${g.emoji} ${g.titulo} <span style="opacity:.6">(${itens.length})</span></div>
        ${itens.map(animalCardHtml).join('')}
      </div>`;
  }).join('');
  // Carrega stats dos animais que optaram por exibir
  if (_meusAnimais.some(a => a.mostrar_stats)) carregarStatsAnimais();
}

function animalCardHtml(a) {
  const fotos = Array.isArray(a.fotos) ? a.fotos : [];
  const fotosHtml = fotos.length
    ? `<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin:8px 0">${fotos.map(u => `<img src="${esc(u)}" loading="lazy" onclick="window.open('${esc(u)}','_blank')" style="height:130px;border-radius:8px;flex-shrink:0;cursor:pointer">`).join('')}</div>`
    : '';
  const gen = [];
  if (a.pai)         gen.push(`<span><b style="color:var(--fg);font-weight:600">Pai:</b> ${esc(a.pai)}</span>`);
  if (a.mae)         gen.push(`<span><b style="color:var(--fg);font-weight:600">Mãe:</b> ${esc(a.mae)}</span>`);
  if (a.avo_materno) gen.push(`<span><b style="color:var(--fg);font-weight:600">Avô materno:</b> ${esc(a.avo_materno)}</span>`);
  const genHtml = gen.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px 14px;font-size:12.5px;color:var(--muted);margin-bottom:6px">${gen.join('')}</div>` : '';
  const sobreHtml = a.sobre ? `<div style="font-size:13px;line-height:1.55;white-space:pre-wrap;color:var(--fg);margin-bottom:6px">${esc(a.sobre)}</div>` : '';
  const statsHtml = a.mostrar_stats
    ? `<div id="animal-stats-${a.id}" style="margin-top:8px"><span class="mini-spin"></span> <span style="font-size:11.5px;color:var(--muted)">carregando desempenho…</span></div>`
    : '';
  const delBtn = _ehProprio
    ? `<button class="cavalo-remove" onclick="removerAnimal(${a.id})" title="Remover" style="flex-shrink:0">×</button>`
    : '';
  return `
    <div style="border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="font-weight:700;font-size:14.5px">${esc(a.nome)}${a.raca ? ` <span style="font-size:11.5px;font-weight:500;color:var(--muted)">· ${esc(a.raca)}</span>` : ''}</div>
        ${delBtn}
      </div>
      ${fotosHtml}
      ${genHtml}
      ${sobreHtml}
      ${statsHtml}
    </div>`;
}

async function carregarStatsAnimais() {
  for (const a of _meusAnimais) {
    if (!a.mostrar_stats) continue;
    const box = $(`animal-stats-${a.id}`);
    if (!box) continue;
    const key = a.nome.toLowerCase();
    let s;
    if (key in _animalStats) s = _animalStats[key];
    else {
      const { data } = await sb.rpc('stats_cavalo', { cavalo_input: a.nome });
      s = data?.[0] || null;
      _animalStats[key] = s;
    }
    const box2 = $(`animal-stats-${a.id}`);
    if (!box2) continue;
    if (!s || (s.total_participacoes || 0) === 0) {
      box2.innerHTML = `<div style="font-size:11.5px;color:var(--muted)">Sem resultados registrados.</div>`;
      continue;
    }
    const pct = (n) => s.total_participacoes > 0 ? Math.round((n / s.total_participacoes) * 100) : 0;
    box2.innerHTML = `
      <div class="cavalo-stats-mini">
        <div class="cavalo-stat"><div class="v">${s.total_participacoes}</div><div class="l">Particip.</div></div>
        <div class="cavalo-stat"><div class="v">${pct(s.zeros)}%</div><div class="l">Zeros</div></div>
        <div class="cavalo-stat"><div class="v">${pct(s.vitorias)}%</div><div class="l">Vitórias</div></div>
        <div class="cavalo-stat"><div class="v">${pct(s.top6)}%</div><div class="l">Top 6</div></div>
      </div>
      ${s.cavaleiros?.length ? `<div class="cavalo-riders">🏇 ${s.cavaleiros.slice(0, 5).map(esc).join(' · ')}${s.cavaleiros.length > 5 ? ` <span style="opacity:.7">+${s.cavaleiros.length - 5}</span>` : ''}</div>` : ''}
      <a class="analise-link" style="margin-top:8px;font-size:11.5px" href="resultados.html?cavalo=${encodeURIComponent(a.nome)}">Ver resultados →</a>`;
  }
}

function atualizaStatsDisponivel() {
  const statsRow = $('animal-stats-row');
  const statsTog = $('animal-stats-toggle');
  const statsNote = $('animal-stats-note');
  if (!statsRow) return;
  statsRow.style.opacity = _animalResultadoOk ? '1' : '.5';
  if (!_animalResultadoOk) {
    _animalStatsLigado = false;
    statsTog.classList.remove('on');
    statsNote.textContent = 'Disponível só quando o sistema reconhece resultados pra esse nome.';
  } else {
    statsNote.textContent = 'O sistema encontrou resultados pra esse nome. Ligue para exibir as estatísticas.';
  }
}

function wireAreaCriador() {
  const card = $('criador-edit-card');
  if (!card) return;

  _animalTipoNovo = 'matriz';
  _animalFotosNovas = [];
  _animalResultadoOk = false;
  _animalStatsLigado = false;

  // Seletor de tipo
  card.querySelectorAll('#animal-tipo-toggle .fchip').forEach(c => {
    c.onclick = () => {
      card.querySelectorAll('#animal-tipo-toggle .fchip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      _animalTipoNovo = c.dataset.tipo;
    };
  });

  // Toggle de exibir stats (só funciona quando há resultados)
  const statsTog = $('animal-stats-toggle');
  statsTog.onclick = () => {
    if (!_animalResultadoOk) return;
    _animalStatsLigado = !_animalStatsLigado;
    statsTog.classList.toggle('on', _animalStatsLigado);
  };

  // Autocomplete do nome + detecção de resultados
  const input = $('animal-nome');
  const drop = $('animal-drop');
  const hint = $('animal-result-hint');
  let acTimer, acItems = [];

  const checaResultados = async (nome) => {
    nome = (nome || '').trim();
    _animalResultadoOk = false;
    if (nome.length >= 2) {
      const { data } = await sb.rpc('stats_cavalo', { cavalo_input: nome });
      const s = data?.[0];
      if (s && (s.total_participacoes || 0) > 0) {
        _animalResultadoOk = true;
        hint.textContent = `✓ ${s.total_participacoes} resultado(s) reconhecido(s) — dá pra exibir as estatísticas.`;
        hint.style.color = 'var(--accent)';
      } else {
        hint.textContent = 'Sem resultados reconhecidos pra esse nome (tudo bem, pode cadastrar mesmo assim).';
        hint.style.color = '';
      }
    } else {
      hint.textContent = '';
    }
    atualizaStatsDisponivel();
  };

  input.addEventListener('input', () => {
    clearTimeout(acTimer);
    const termo = input.value.trim();
    _animalResultadoOk = false; atualizaStatsDisponivel();
    if (termo.length < 2) { drop.classList.remove('open'); drop.innerHTML = ''; hint.textContent = ''; return; }
    acTimer = setTimeout(async () => {
      const { data } = await sb.rpc('buscar_cavalos', { termo });
      acItems = data || [];
      if (acItems.length) {
        drop.innerHTML = acItems.map((it, i) => `
          <div class="ac-item" data-i="${i}">
            <span class="ac-nome">${esc(it.nome)}</span>
            <span class="ac-count">${it.total} ${it.total === 1 ? 'resultado' : 'resultados'}</span>
          </div>`).join('');
        drop.querySelectorAll('.ac-item').forEach(el => {
          el.onclick = () => {
            input.value = acItems[parseInt(el.dataset.i)].nome;
            drop.classList.remove('open');
            checaResultados(input.value);
          };
        });
        drop.classList.add('open');
      } else {
        drop.classList.remove('open'); drop.innerHTML = '';
      }
      checaResultados(termo);
    }, 300);
  });
  document.addEventListener('click', (e) => { if (!card.contains(e.target)) drop.classList.remove('open'); });

  // Upload de fotos
  const fotosInput = $('animal-fotos-input');
  fotosInput.onchange = async () => {
    const files = Array.from(fotosInput.files || []);
    if (!files.length) return;
    fotosInput.disabled = true;
    for (const f of files) {
      const url = await uploadImagem(f, 'criador-imgs');
      if (url) _animalFotosNovas.push(url);
    }
    fotosInput.value = '';
    fotosInput.disabled = false;
    renderFotosPreview();
  };

  $('btn-add-animal').onclick = salvarAnimal;

  renderFotosPreview();
}

function renderFotosPreview() {
  const box = $('animal-fotos-preview');
  if (!box) return;
  box.innerHTML = _animalFotosNovas.map((u, i) => `
    <div style="position:relative">
      <img src="${esc(u)}" style="width:66px;height:66px;object-fit:cover;border-radius:8px">
      <button class="cavalo-remove" onclick="removerFotoNova(${i})" title="Remover foto" style="position:absolute;top:-7px;right:-7px">×</button>
    </div>`).join('');
}

function removerFotoNova(i) {
  _animalFotosNovas.splice(i, 1);
  renderFotosPreview();
}

async function salvarAnimal() {
  if (!_ehProprio) return;
  const nome = $('animal-nome').value.trim();
  if (nome.length < 2) { alert('Informe o nome do animal'); return; }
  const btn = $('btn-add-animal');
  btn.disabled = true; btn.textContent = 'Salvando…';
  const row = {
    profile_id:    _meuId,
    tipo:          _animalTipoNovo,
    nome,
    raca:          $('animal-raca').value.trim() || null,
    pai:           $('animal-pai').value.trim() || null,
    mae:           $('animal-mae').value.trim() || null,
    avo_materno:   $('animal-avo').value.trim() || null,
    sobre:         $('animal-sobre').value.trim() || null,
    fotos:         _animalFotosNovas.slice(),
    mostrar_stats: _animalResultadoOk && _animalStatsLigado,
  };
  const { data, error } = await sb.from('criador_animais').insert(row).select().single();
  if (error) { alert('Erro ao salvar: ' + error.message); btn.disabled = false; btn.textContent = 'Adicionar animal'; return; }
  _meusAnimais.push(data);
  // Limpa o formulário
  _animalFotosNovas = [];
  _animalResultadoOk = false; _animalStatsLigado = false;
  ['animal-nome', 'animal-raca', 'animal-pai', 'animal-mae', 'animal-avo', 'animal-sobre'].forEach(id => { const el = $(id); if (el) el.value = ''; });
  $('animal-result-hint').textContent = '';
  atualizaStatsDisponivel();
  renderFotosPreview();
  renderCriadorCards();
  $('ok-animal').textContent = '✓ Animal adicionado';
  btn.disabled = false; btn.textContent = 'Adicionar animal';
  setTimeout(() => { const o = $('ok-animal'); if (o) o.textContent = ''; }, 2500);
}

async function removerAnimal(id) {
  if (!confirm('Remover este animal da sua criação?')) return;
  const { error } = await sb.from('criador_animais').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  _meusAnimais = _meusAnimais.filter(a => a.id !== id);
  renderCriadorCards();
  atualizarAbas();
}

// ─── Upload de imagens ─────────────────────────────────────────
async function uploadImagem(file, bucket) {
  if (!file) return null;
  if (file.size > 5 * 1024 * 1024) { alert('Imagem grande demais (máx 5MB)'); return null; }
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const path = `${_profile.id}/${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from(bucket).upload(path, file, { upsert: false });
  if (upErr) { alert('Erro no upload: ' + upErr.message); return null; }
  const { data } = sb.storage.from(bucket).getPublicUrl(path);
  return data?.publicUrl || null;
}

// ─── Crop ──────────────────────────────────────────────────────
let _cropper = null;
let _cropTarget = null; // 'avatar' ou 'cover'

function abrirCrop(file, target) {
  _cropTarget = target;
  const reader = new FileReader();
  reader.onload = (e) => {
    $('crop-img').src = e.target.result;
    $('crop-modal-title').textContent = target === 'avatar' ? 'Ajustar foto de perfil (quadrado)' : 'Ajustar capa (banner 16:6)';
    $('crop-modal').classList.add('open');
    if (_cropper) _cropper.destroy();
    setTimeout(() => {
      _cropper = new Cropper($('crop-img'), {
        aspectRatio: target === 'avatar' ? 1 : 16/6,
        viewMode: 1,
        autoCropArea: 1,
        background: false,
        movable: true, zoomable: true, rotatable: false, scalable: false,
      });
    }, 50);
  };
  reader.readAsDataURL(file);
}

function cancelCrop() {
  if (_cropper) { _cropper.destroy(); _cropper = null; }
  $('crop-modal').classList.remove('open');
}

async function confirmCrop() {
  if (!_cropper) return;
  const btn = $('crop-confirm-btn');
  btn.disabled = true; btn.textContent = 'Enviando…';

  const targetSize = _cropTarget === 'avatar' ? { w: 400, h: 400 } : { w: 1200, h: 450 };
  const canvas = _cropper.getCroppedCanvas({ width: targetSize.w, height: targetSize.h, imageSmoothingQuality: 'high' });
  const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.88));
  const file = new File([blob], 'crop.jpg', { type: 'image/jpeg' });

  const bucket = _cropTarget === 'avatar' ? 'avatars' : 'covers';
  const url = await uploadImagem(file, bucket);
  if (!url) { btn.disabled = false; btn.textContent = 'Confirmar'; return; }

  const updateField = _cropTarget === 'avatar' ? 'avatar_url' : 'capa_url';
  const { error } = await sb.from('profiles').update({ [updateField]: url }).eq('id', _profile.id);
  if (error) { alert('Erro: ' + error.message); btn.disabled = false; btn.textContent = 'Confirmar'; return; }

  _profile[updateField] = url;
  if (_cropTarget === 'avatar') renderAvatar(); else renderCover();
  cancelCrop();
  btn.disabled = false; btn.textContent = 'Confirmar';
}

function formatTempo(iso) {
  const t = new Date(iso);
  const agora = new Date();
  const diff = (agora - t) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)} min`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h`;
  if (diff < 604800) return `${Math.floor(diff/86400)} d`;
  return t.toLocaleDateString('pt-BR');
}

async function toggleLike(postId) {
  if (!_meuId) { window.location.href = 'login.html'; return; }
  const post = _feedPosts.find(p => p.id === postId);
  if (!post) return;
  if (post._liked_by_me) {
    await sb.from('post_likes').delete().eq('post_id', postId).eq('profile_id', _meuId);
    post._liked_by_me = false; post.likes_count = Math.max(0, (post.likes_count||0) - 1);
  } else {
    await sb.from('post_likes').insert({ post_id: postId, profile_id: _meuId });
    post._liked_by_me = true; post.likes_count = (post.likes_count||0) + 1;
  }
  renderFeedList();
}

async function toggleComments(postId) {
  const box = $(`comments-box-${postId}`);
  if (!box) return;
  if (box.classList.contains('open')) { box.classList.remove('open'); box.innerHTML = ''; return; }
  box.classList.add('open');
  box.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:6px">Carregando comentários…</div>';
  const { data } = await sb.from('post_comments')
    .select('id,texto,criado_em,profile_id,profiles!inner(id,nome_completo,avatar_url)')
    .eq('post_id', postId)
    .order('criado_em', { ascending: true });
  renderComments(postId, data || []);
}

function renderComments(postId, list) {
  const box = $(`comments-box-${postId}`);
  if (!box) return;
  const itemsHtml = list.map(c => {
    const prof = c.profiles || {};
    const ini = (prof.nome_completo || '?').trim().split(/\s+/)[0]?.[0]?.toUpperCase() || '?';
    const av = prof.avatar_url ? `<img src="${esc(prof.avatar_url)}">` : esc(ini);
    const podeDeletar = _meuId === c.profile_id;
    return `
      <div class="comment-item">
        <div class="comment-avatar">${av}</div>
        <div style="flex:1;min-width:0">
          <div class="comment-bubble"><b><a href="perfil.html?u=${prof.id}">${esc(prof.nome_completo || '')}</a></b>${esc(c.texto)}</div>
          <div class="comment-time">${formatTempo(c.criado_em)}</div>
        </div>
        ${podeDeletar ? `<button class="comment-del" onclick="deletarComment(${c.id},${postId})">×</button>` : ''}
      </div>
    `;
  }).join('');
  const inputHtml = _meuId ? `
    <div class="comment-input-wrap">
      <input class="comment-input" id="ci-${postId}" placeholder="Escreva um comentário…" onkeydown="if(event.key==='Enter')enviarComment(${postId})">
      <button class="comment-send-btn" onclick="enviarComment(${postId})">Enviar</button>
    </div>
  ` : '';
  box.innerHTML = itemsHtml + inputHtml;
}

async function enviarComment(postId) {
  const input = $(`ci-${postId}`);
  if (!input) return;
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  const { error } = await sb.from('post_comments').insert({ post_id: postId, profile_id: _meuId, texto });
  if (error) { alert('Erro: ' + error.message); return; }
  // Atualiza contador local
  const post = _feedPosts.find(p => p.id === postId);
  if (post) post.comments_count = (post.comments_count || 0) + 1;
  const cnt = $(`comments-${postId}`); if (cnt) cnt.textContent = post.comments_count;
  // Recarrega lista de comments
  toggleComments(postId); // fecha
  setTimeout(() => toggleComments(postId), 50); // reabre
}

async function deletarComment(commentId, postId) {
  if (!confirm('Excluir esse comentário?')) return;
  const { error } = await sb.from('post_comments').delete().eq('id', commentId);
  if (error) { alert('Erro: ' + error.message); return; }
  const post = _feedPosts.find(p => p.id === postId);
  if (post) post.comments_count = Math.max(0, (post.comments_count || 0) - 1);
  const cnt = $(`comments-${postId}`); if (cnt) cnt.textContent = post.comments_count;
  toggleComments(postId); setTimeout(() => toggleComments(postId), 50);
}

async function deletarPost(id) {
  if (!confirm('Excluir esse post?')) return;
  const { error } = await sb.from('feed_posts').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  _feedPosts = _feedPosts.filter(p => p.id !== id);

async function toggleFollow() {
  if (!_meuId) { window.location.href = 'login.html'; return; }
  if (_ehProprio) return;
  const ehPrivado = _profile.visibilidade === 'privado';

  // Já sigo (aceito) OU já solicitei (pendente) → desfaz / cancela
  if (_isFollowing || _followPendente) {
    const eraAceito = _isFollowing;
    const { error } = await sb.from('follows').delete().eq('follower_id', _meuId).eq('followed_id', _alvoId);
    if (error) { alert('Erro: ' + error.message); return; }
    _isFollowing = false; _followPendente = false;
    if (eraAceito) _followersCount = Math.max(0, _followersCount - 1);
    // Saí de um perfil privado (seguindo ou pendente) → reesconde o conteúdo
    if (ehPrivado) { _bloqueado = true; renderSobre(); renderFeed(); atualizarAbas(); }
    renderHead();
    return;
  }

  // Novo follow. Privado → entra como 'pendente' (precisa aprovação do dono);
  // público → entra direto como 'aceito'. (A RLS no banco também garante isso.)
  const status = ehPrivado ? 'pendente' : 'aceito';
  const { error } = await sb.from('follows').insert({ follower_id: _meuId, followed_id: _alvoId, status });
  if (error) { alert('Erro: ' + error.message); return; }
  if (ehPrivado) {
    _followPendente = true;
    meuNomeExibicao().then(nome => dmSistema(_alvoId, `🔔 ${nome} solicitou seguir seu perfil — aprove na sua página de perfil.`));
    renderSobre(); // atualiza o gate: "solicitação enviada, aguarde aprovação"
  } else {
    _isFollowing = true; _followersCount++;
    meuNomeExibicao().then(nome => dmSistema(_alvoId, `👋 ${nome} começou a te seguir!`));
    if (_bloqueado) { _bloqueado = false; renderSobre(); renderFeed(); atualizarAbas(); }
  }
  renderHead();
}

    const pend = solicRes.data || [];
    if (pend.length) {
      const { data: profs } = await sb.from('profiles_publicos').select('id,nome_completo,avatar_url').in('id', pend.map(r => r.follower_id));
      const pmap = new Map((profs || []).map(p => [p.id, p]));
      _solicitacoes = pend.map(r => ({ ...r, prof: pmap.get(r.follower_id) || {} }));
    } else {
      _solicitacoes = [];
    }
    renderSobre();
  }
  renderHead();
}

async function nomePublicoP(id) {
  try { const { data } = await sb.from('profiles_publicos').select('nome_completo').eq('id', id).maybeSingle(); return data?.nome_completo || 'Alguém'; }
  catch (_) { return 'Alguém'; }
}

// Toast simples (perfil.html não tinha um).
function toastPerfil(msg) {
  let t = $('toast-perfil');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast-perfil';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--surface,#10182a);border:1px solid var(--accent,#e85d04);color:#fff;font-size:13px;font-weight:600;padding:12px 18px;border-radius:8px;max-width:90%;text-align:center;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._h);
  t._h = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(8px)'; }, 4200);
}

function pedirPermissaoNotifP() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { inscreverPush(); return; }
  if (Notification.permission === 'default' && !_notifPedidaP) {
    _notifPedidaP = true;
    setTimeout(() => {
      try { Promise.resolve(Notification.requestPermission()).then(p => { if (p === 'granted') inscreverPush(); }); } catch (_) {}
    }, 2500);
  }
}

// ── Web Push: inscreve o dispositivo e guarda no Supabase ─────────
async function inscreverPush() {
  try {
    if (!_meuId) return;
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    if (Notification.permission !== 'granted') return;
    if (!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY.startsWith('COLE_AQUI')) return;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    const j = sub.toJSON();
    if (!j || !j.endpoint || !j.keys) return;
    await sb.from('push_subscriptions').upsert({
      user_id: _meuId,
      endpoint: j.endpoint,
      p256dh: j.keys.p256dh,
      auth: j.keys.auth,
      user_agent: (navigator.userAgent || '').slice(0, 300),
    }, { onConflict: 'endpoint' });
  } catch (e) { console.warn('[push]', e); }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function notificarCelularP(titulo, corpo) {
  try {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (document.visibilityState === 'visible' && document.hasFocus()) return;
    const opts = { body: corpo, icon: 'icons/icon-192.png', badge: 'icons/icon-192.png', tag: 'cavalaria-perfil', renotify: true, data: { destino: 'perfil' } };
    if (navigator.serviceWorker && navigator.serviceWorker.ready) navigator.serviceWorker.ready.then(reg => reg.showNotification(titulo, opts)).catch(() => { try { new Notification(titulo, opts); } catch (_) {} });
    else new Notification(titulo, opts);
  } catch (e) { console.warn('[notif]', e); }
}
