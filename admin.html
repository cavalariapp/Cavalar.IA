<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cavalar.IA — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0f1a;
  --surface: #111827;
  --surface2: #1a2332;
  --surface3: #243044;
  --border: #1e2a3e;
  --fg: #e8edf5;
  --muted: #7a8ba8;
  --accent: #e84d0e;
  --accent-dim: rgba(232,77,14,.13);
  --accent-hover: #ff5f1f;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --sidebar-w: 240px;
  --header-h: 56px;
  --font: 'Inter', system-ui, sans-serif;
  --font-display: 'Barlow Condensed', 'Impact', sans-serif;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
}

/* LOGIN SCREEN */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
#login-screen.hidden { display: none; }
.login-box {
  width: 380px; padding: 36px 32px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px;
}
.login-logo {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 900; font-style: italic;
  text-transform: uppercase; text-align: center; margin-bottom: 4px;
  color: #fff;
  display: flex; justify-content: center;
}
.login-logo .dot { color: var(--accent); }
.login-logo-img {
  height: 32px; width: auto;
}
.login-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 11px 14px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); font-size: 14px; outline: none;
  transition: border .2s;
}
.form-group input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background .2s;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 12px; display: none; }

/* ADMIN LAYOUT */
#admin-layout { display: flex; height: 100vh; }
#admin-layout.hidden { display: none; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-logo {
  padding: 16px 18px;
  font-family: var(--font-display);
  font-size: 20px; font-weight: 900; font-style: italic;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  color: #fff;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-logo .dot { color: var(--accent); }
.sidebar-logo-img {
  height: 22px; width: auto;
}
.sidebar-logo .badge {
  font-family: var(--font); font-size: 8px; font-weight: 800;
  background: var(--accent); color: #fff;
  padding: 2px 6px; border-radius: 3px; margin-left: 6px;
  text-transform: uppercase; font-style: normal;
}
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; cursor: pointer;
  color: var(--muted); font-size: 13px; font-weight: 500;
  transition: all .15s; border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--fg); background: rgba(255,255,255,.03); }
.nav-item.active { color: var(--accent); background: var(--accent-dim); border-left-color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--border); }
.admin-user { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.btn-logout {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 6px 12px; border-radius: 4px; cursor: pointer;
  font-size: 11px; font-weight: 600; width: 100%;
  transition: all .15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: var(--header-h); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0;
}
.topbar h2 { font-size: 16px; font-weight: 700; }
.topbar-actions { display: flex; gap: 8px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px 16px;
}
.stat-card .num { font-size: 28px; font-weight: 800; color: #fff; }
.stat-card .lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
.stat-card .accent { color: var(--accent); }

/* TABLES */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.table-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.table-hdr h3 { font-size: 14px; font-weight: 700; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
td .actions { display: flex; gap: 6px; }
.btn-icon {
  width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
.btn-icon.danger:hover { border-color: var(--red); color: var(--red); }
.empty-state { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: all .15s;
}
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { opacity: .85; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.65); display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; width: 100%; max-width: 640px;
  max-height: 90vh; overflow-y: auto;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.modal-hdr h3 { font-size: 16px; font-weight: 700; }
.btn-close {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--muted); cursor: pointer;
  border-radius: 4px; font-size: 18px;
}
.btn-close:hover { background: var(--surface2); color: var(--fg); }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* FORM */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row .full { grid-column: 1 / -1; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 5px; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 13px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); font-size: 13px; outline: none;
  transition: border .2s; font-family: var(--font);
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--accent); }
.form-field textarea { resize: vertical; min-height: 80px; }
.form-field select { cursor: pointer; appearance: auto; }
.form-field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
.form-check { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.form-check input { width: 16px; height: 16px; accent-color: var(--accent); }
.form-check label { font-size: 13px; cursor: pointer; }

/* STATUS BADGE */
.badge {
  display: inline-flex; padding: 2px 8px; border-radius: 100px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
}
.badge-green { background: rgba(34,197,94,.15); color: var(--green); }
.badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-gray { background: rgba(122,139,168,.15); color: var(--muted); }

/* TOAST */
.toast {
  position: fixed; bottom: 30px; right: 30px; z-index: 9999;
  background: var(--surface); border: 1px solid var(--accent);
  color: #fff; padding: 12px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transform: translateY(10px);
  transition: all .3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* SEARCH */
.search-input-wrap {
  display: flex; gap: 8px; align-items: center;
}
.search-input-wrap input {
  padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--fg); font-size: 13px; outline: none; width: 220px;
  transition: border .2s;
}
.search-input-wrap input:focus { border-color: var(--accent); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .modal { max-width: 100%; margin: 12px; }
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  CAVALAR.IA — ADMIN
// ═══════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://vetkgrksvbegifotmltv.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZldGtncmtzdmJlZ2lmb3RtbHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDM5MzMsImV4cCI6MjA5NDc3OTkzM30.OFTLHndXd3E42xrWR_nlK-nT_XYuBJA6rKKRVKhh57k';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});

// ─── STATE ────────────────────────────────────────────────────
let S = { session: null, section: 'dashboard', editId: null };

// ─── UTILS ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function toast(msg, color) {
  const t = $('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--accent)';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function dateStr() {
  return new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase().replace(/\./g,'');
}

// ─── AUTH ────────────────────────────────────────────────────
$('login-btn').addEventListener('click', async () => {
  const email = $('login-email').value.trim();
  const pass = $('login-pass').value.trim();
  const errEl = $('login-error');
  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; errEl.style.display = 'block'; return; }
  $('login-btn').disabled = true;
  $('login-btn').textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  $('login-btn').disabled = false;
  $('login-btn').textContent = 'ENTRAR';
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  S.session = data.session;
  initAdmin();
});

async function logout() {
  await sb.auth.signOut();
  S.session = null;
  $('admin-layout').classList.add('hidden');
  $('login-screen').classList.remove('hidden');
}

// Check existing session on load
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { S.session = session; initAdmin(); }
})();

// ─── ADMIN INIT ──────────────────────────────────────────────
function initAdmin() {
  $('login-screen').classList.add('hidden');
  $('admin-layout').classList.remove('hidden');
  $('admin-email').textContent = S.session.user.email;
  navTo('dashboard');
}

// ─── NAV ──────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navTo(el.dataset.section));
});

function navTo(section) {
  S.section = section;
  S.editId = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.section === section));
  const titles = { dashboard:'Dashboard', news:'Notícias', videos:'Vídeos', podcasts:'Podcasts', auctions:'Leilões', rankings:'Rankings', events:'Eventos', horses:'Cavalos', aliases:'Match de Cavalos', cupons:'Cupons', settings:'Configurações' };
  $('page-title').textContent = titles[section] || 'Dashboard';
  renderSection(section);
}

function renderSection(section) {
  const c = $('page-content');
  const a = $('topbar-actions');
  a.innerHTML = '';
  if (section === 'dashboard') renderDashboard();
  else if (section === 'news') renderTable(c, a, 'news', 'Notícia');
  else if (section === 'videos') renderTable(c, a, 'videos', 'Vídeo');
  else if (section === 'podcasts') renderTable(c, a, 'podcasts', 'Episódio');
  else if (section === 'auctions') renderTable(c, a, 'auctions', 'Lote');
  else if (section === 'rankings') renderTable(c, a, 'rankings', 'Ranking');
  else if (section === 'events') renderTable(c, a, 'events', 'Evento');
  else if (section === 'horses') renderTable(c, a, 'horses', 'Cavalo');
  else if (section === 'cupons') renderCupons(c);
  else if (section === 'aliases') renderAliases(c);
  else if (section === 'settings') renderSettings(c);
}

// ─── MATCH DE CAVALOS (apelidos) ─────────────────────────────
// Dois nomes que são o MESMO cavalo (ex.: "Lika JT" e "Lika JT PB"). O 2º (oficial)
// vira o canônico; o 1º (variante) passa a apontar pra ele (set_cavalo_alias).
let _alTimer = null;

function renderAliases(c) {
  c.innerHTML = `
    <div class="table-wrap" style="margin-bottom:16px">
      <div class="table-hdr"><h3>Novo match — mesmo cavalo, nomes diferentes</h3></div>
      <div style="padding:16px">
        <p style="color:var(--muted);font-size:12.5px;line-height:1.6;margin-bottom:14px">
          Busque os dois nomes (digite parte do nome). O <b>nome variante</b> (apelido, ex.: "Lika JT PB")
          passa a apontar para o <b>nome oficial</b> (canônico, ex.: "Lika JT") — o sistema trata os dois
          como o mesmo animal em resultados, perfil e genética.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
          <div style="position:relative">
            <label style="font-size:12px;color:var(--muted)">Nome variante (apelido)</label>
            <input id="al-var" autocomplete="off" placeholder="ex.: Lika JT PB" oninput="alBuscar('var')"
              style="width:100%;margin-top:4px;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)">
            <div id="al-var-drop" class="al-drop"></div>
          </div>
          <div style="position:relative">
            <label style="font-size:12px;color:var(--muted)">Nome oficial (canônico)</label>
            <input id="al-can" autocomplete="off" placeholder="ex.: Lika JT" oninput="alBuscar('can')"
              style="width:100%;margin-top:4px;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)">
            <div id="al-can-drop" class="al-drop"></div>
          </div>
        </div>
        <button class="btn btn-accent" onclick="criarAlias()" style="margin-top:16px">↔ Criar match</button>
      </div>
    </div>
    <div class="table-wrap"><div class="table-hdr"><h3>Matches existentes</h3></div>
      <div class="table-scroll" id="al-lista"><div class="empty-state">Carregando…</div></div>
    </div>
    <style>
      .al-drop{position:absolute;left:0;right:0;top:100%;z-index:20;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-top:2px;max-height:240px;overflow:auto;display:none}
      .al-drop.open{display:block}
      .al-drop div{padding:8px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
      .al-drop div:hover{background:var(--accent-dim)}
    </style>`;
  carregarAliases();
}

function alBuscar(qual) {
  const inp = $('al-' + qual), drop = $('al-' + qual + '-drop');
  const termo = (inp.value || '').trim();
  clearTimeout(_alTimer);
  if (termo.length < 2) { drop.classList.remove('open'); return; }
  _alTimer = setTimeout(async () => {
    const { data, error } = await sb.rpc('buscar_nomes_cavalos', { termo });
    if (error) return;
    // dedup pela 1ª linha (nome), ignorando a genealogia
    const nomes = [...new Set((data || []).map(r => String(r.nome || '').split('\n')[0].trim()).filter(Boolean))].slice(0, 40);
    if (!nomes.length) { drop.innerHTML = '<div style="color:var(--muted);cursor:default">Nenhum nome encontrado.</div>'; drop.classList.add('open'); return; }
    drop.innerHTML = nomes.map(n => `<div onclick="alPick('${qual}', this)" data-n="${esc(n)}">${esc(n)}</div>`).join('');
    drop.classList.add('open');
  }, 250);
}

function alPick(qual, el) {
  $('al-' + qual).value = el.getAttribute('data-n');
  $('al-' + qual + '-drop').classList.remove('open');
}

async function criarAlias() {
  const variante = ($('al-var').value || '').trim();
  const canonico = ($('al-can').value || '').trim();
  if (!variante || !canonico) { alert('Preencha os dois nomes.'); return; }
  if (variante.toUpperCase() === canonico.toUpperCase()) { alert('Os nomes são iguais.'); return; }
  if (!confirm(`Confirmar que "${variante}" é o MESMO cavalo que "${canonico}"?`)) return;
  const { error } = await sb.rpc('set_cavalo_alias', { p_alias: variante, p_canonico: canonico });
  if (error) { alert('Erro: ' + error.message); return; }
  $('al-var').value = ''; $('al-can').value = '';
  carregarAliases();
}

async function carregarAliases() {
  const el = $('al-lista');
  const { data, error } = await sb.rpc('admin_listar_aliases');
  if (error) { el.innerHTML = `<div class="empty-state">Erro: ${esc(error.message)}</div>`; return; }
  if (!data || !data.length) { el.innerHTML = '<div class="empty-state">Nenhum match criado ainda.</div>'; return; }
  const linhas = data.map(a => `
    <tr>
      <td style="font-weight:700">${esc(a.alias_norm)}</td>
      <td style="color:var(--accent)">→ ${esc(a.canonico_norm)}</td>
      <td style="text-align:right"><button class="btn-icon danger" title="Desfazer match" onclick="removerAlias('${esc(a.alias_norm)}')">✕</button></td>
    </tr>`).join('');
  el.innerHTML = `<table><thead><tr><th>Variante (apelido)</th><th>Aponta para (canônico)</th><th></th></tr></thead><tbody>${linhas}</tbody></table>`;
}

async function removerAlias(aliasNorm) {
  if (!confirm(`Desfazer o match de "${aliasNorm}"?`)) return;
  const { error } = await sb.rpc('admin_remover_alias', { p_alias: aliasNorm });
  if (error) { alert('Erro: ' + error.message); return; }
  carregarAliases();
}

// ─── CUPONS ──────────────────────────────────────────────────
// Tudo via RPC admin (a tabela cupons tem RLS sem policy). O servidor valida
// is_admin() em cada chamada — o front é só conveniência.
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

async function renderCupons(c) {
  c.innerHTML = `
    <div class="table-wrap" style="margin-bottom:16px">
      <div class="table-hdr"><h3>Novo cupom</h3></div>
      <div style="padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;align-items:end">
        <label style="font-size:12px;color:var(--muted)">Código<br><input id="cup-codigo" placeholder="EX: AMIGOS2026" style="width:100%;margin-top:4px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg);text-transform:uppercase"></label>
        <label style="font-size:12px;color:var(--muted)">Tipo<br>
          <select id="cup-tipo" onchange="document.getElementById('cup-dias-wrap').style.display=this.value==='dias'?'':'none'" style="width:100%;margin-top:4px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)">
            <option value="vitalicio">Vitalício (pra sempre)</option>
            <option value="dias">Por tempo (dias)</option>
          </select>
        </label>
        <label id="cup-dias-wrap" style="font-size:12px;color:var(--muted);display:none">Dias<br><input id="cup-dias" type="number" value="365" min="1" style="width:100%;margin-top:4px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)"></label>
        <label style="font-size:12px;color:var(--muted)">Limite de usos<br><input id="cup-max" type="number" placeholder="vazio = ilimitado" min="1" style="width:100%;margin-top:4px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)"></label>
        <label style="font-size:12px;color:var(--muted)">Validade do cupom<br><input id="cup-exp" type="date" style="width:100%;margin-top:4px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)"></label>
        <label style="font-size:12px;color:var(--muted);grid-column:1/-1">Descrição (interna)<br><input id="cup-desc" placeholder="ex.: parceiros, imprensa…" style="width:100%;margin-top:4px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--fg)"></label>
        <button class="btn btn-accent" onclick="criarCupom()" style="height:38px">+ Criar cupom</button>
      </div>
    </div>
    <div class="table-wrap"><div class="table-hdr"><h3>Cupons existentes</h3></div>
      <div class="table-scroll" id="cup-lista"><div class="empty-state">Carregando…</div></div>
    </div>`;
  carregarCupons();
}

async function carregarCupons() {
  const el = $('cup-lista');
  const { data, error } = await sb.rpc('admin_listar_cupons');
  if (error) { el.innerHTML = `<div class="empty-state">Erro: ${esc(error.message)}</div>`; return; }
  if (!data || !data.length) { el.innerHTML = '<div class="empty-state">Nenhum cupom ainda.</div>'; return; }
  const linhas = data.map(c => {
    const tipo = c.vitalicio ? 'Vitalício' : `${c.dias} dias`;
    const usos = `${c.usos}${c.max_usos != null ? ' / ' + c.max_usos : ''}`;
    const st = c.ativo ? '<span style="color:var(--green,#3ecf8e)">● ativo</span>' : '<span style="color:var(--muted)">○ inativo</span>';
    const btn = c.ativo
      ? `<button class="btn-icon danger" title="Desativar" onclick="toggleCupom('${esc(c.codigo)}',false)">⦸</button>`
      : `<button class="btn-icon" title="Ativar" onclick="toggleCupom('${esc(c.codigo)}',true)">✓</button>`;
    return `<tr><td style="font-weight:700">${esc(c.codigo)}</td><td>${tipo}</td><td>${usos}</td><td>${esc(c.descricao||'')}</td><td>${st}</td><td style="text-align:right">${btn}</td></tr>`;
  }).join('');
  el.innerHTML = `<table><thead><tr><th>Código</th><th>Tipo</th><th>Usos</th><th>Descrição</th><th>Status</th><th></th></tr></thead><tbody>${linhas}</tbody></table>`;
}

async function criarCupom() {
  const codigo = ($('cup-codigo').value || '').trim();
  if (!codigo) { alert('Informe o código.'); return; }
  const vitalicio = $('cup-tipo').value === 'vitalicio';
  const dias = vitalicio ? null : (parseInt($('cup-dias').value) || 30);
  const max = $('cup-max').value ? parseInt($('cup-max').value) : null;
  const desc = ($('cup-desc').value || '').trim() || null;
  const exp = $('cup-exp').value || null;
  const { data, error } = await sb.rpc('admin_criar_cupom', {
    p_codigo: codigo, p_vitalicio: vitalicio, p_dias: dias,
    p_max_usos: max, p_descricao: desc, p_expira_em: exp,
  });
  if (error) { alert('Erro: ' + error.message); return; }
  if (data && data.ok === false) { alert(data.erro || 'Não foi possível criar.'); return; }
  $('cup-codigo').value = ''; $('cup-desc').value = ''; $('cup-max').value = ''; $('cup-exp').value = '';
  carregarCupons();
}

async function toggleCupom(codigo, ativo) {
  const { error } = await sb.rpc('admin_set_cupom_ativo', { p_codigo: codigo, p_ativo: ativo });
  if (error) { alert('Erro: ' + error.message); return; }
  carregarCupons();
}

// ─── TABLE RENDERER ──────────────────────────────────────────
const TABLE_CONFIG = {
  news:     { fields: ['cat','title','date'],   headers: ['Categoria','Título','Data'], order: 'date', asc: false },
  videos:   { fields: ['cat','title','duration'], headers: ['Categoria','Título','Duração'], order: 'id', asc: true },
  podcasts: { fields: ['ep','title','guest','duration'], headers: ['EP','Título','Convidado','Duração'], order: 'ep', asc: false },
  auctions: { fields: ['lot','horse','price','bids','status'], headers: ['Lote','Cavalo','Preço','Lances','Status'], order: 'lot', asc: true },
  rankings: { fields: ['pos','name','pts','flag'], headers: ['Pos','Nome','Pontos','Bandeira'], order: 'pos', asc: true },
  events:   { fields: ['day','mon','level','name','loc'], headers: ['Dia','Mês','Nível','Nome','Local'], order: 'day', asc: true },
  horses:   { fields: ['name','rider','breed','score','price'], headers: ['Nome','Cavaleiro','Raça','Score','Preço'], order: 'score', asc: false },
};

async function renderTable(c, a, table, label) {
  const cfg = TABLE_CONFIG[table];
  const { data, error } = await sb.from(table).select('*').order(cfg.order, { ascending: cfg.asc });
  if (error) { c.innerHTML = `<div class="empty-state">Erro: ${error.message}</div>`; return; }
  a.innerHTML = `<button class="btn btn-accent" onclick="openNew('${table}','${label}')">+ Novo ${label}</button>`;
  if (!data || data.length === 0) {
    c.innerHTML = `<div class="table-wrap"><div class="empty-state">Nenhum registro encontrado. Clique em "+ Novo ${label}" para criar.</div></div>`;
    return;
  }
  const cols = cfg.headers.map(h => `<th>${h}</th>`).join('') + '<th>Ações</th>';
  const rows = data.map(row => {
    const cells = cfg.fields.map(f => {
      let v = row[f];
      if (f === 'price') v = v ? '€ ' + Number(v).toLocaleString('de-DE') : '—';
      if (f === 'status') v = statusBadge(v);
      if (f === 'date') v = v || '—';
      return `<td>${escHtml(v)}</td>`;
    }).join('');
    return `<tr>${cells}<td><div class="actions">
      <button class="btn-icon" onclick="openEdit('${table}','${label}',${row.id})" title="Editar">✎</button>
      <button class="btn-icon danger" onclick="confirmDelete('${table}',${row.id})" title="Excluir">✕</button>
    </div></td></tr>`;
  }).join('');
  c.innerHTML = `<div class="table-wrap"><div class="table-scroll"><table><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function statusBadge(v) {
  if (v === 'live') return '<span class="badge badge-green">Ao Vivo</span>';
  if (v === 'upcoming') return '<span class="badge badge-yellow">Agendado</span>';
  if (v === 'done') return '<span class="badge badge-gray">Encerrado</span>';
  return escHtml(v) || '<span class="badge badge-gray">—</span>';
}

// ─── MODAL: NEW / EDIT ──────────────────────────────────────
let modalTable = null;

function openNew(table, label) {
  modalTable = table;
  S.editId = null;
  $('modal-title').textContent = `Novo ${label}`;
  $('modal-body').innerHTML = buildForm(table, null);
  $('modal-save').textContent = 'Criar';
  $('modal').classList.add('open');
}

async function openEdit(table, label, id) {
  modalTable = table;
  S.editId = id;
  const { data } = await sb.from(table).select('*').eq('id', id).single();
  if (!data) { toast('Erro ao carregar'); return; }
  $('modal-title').textContent = `Editar ${label}`;
  $('modal-body').innerHTML = buildForm(table, data);
  $('modal-save').textContent = 'Salvar';
  $('modal').classList.add('open');
}

function closeModal() { $('modal').classList.remove('open'); modalTable = null; S.editId = null; }

function buildForm(table, data) {

            <label>Categoria</label>

        </div>
        <div class="form-field full">
          <label>Resumo</label>
          <textarea id="f-excerpt" rows="3">${v('excerpt')}</textarea>
        </div>
        <div class="form-field full">
          <label>Corpo do texto</label>
          <textarea id="f-body" rows="6" placeholder="Escreva o texto da notícia aqui...">${data ? (data.body_raw || stripHtml(data.body||'')) : ''}</textarea>

            <label>Data</label>

          <div class="form-field">
            <label>URL da Imagem</label>

          </div>
        </div>
        <div class="form-check">
          <input type="checkbox" id="f-featured" ${data?.featured ? 'checked' : ''}>
          <label for="f-featured">Destacar como principal</label>
        </div>`;

    case 'videos':
      return `
        <div class="form-row">
          <div class="form-field">
            <label>Título</label>
            <input id="f-title" value="${v('title')}">
          </div>
          <div class="form-field">
            <label>Categoria</label>
            <select id="f-cat">
              ${['Salto','Genética','Criação','Análise IA','Treinamento'].map(c => `<option ${sel('cat',c)}>${c}</option>`).join('')}

        </div>
        <div class="form-field">
          <label>URL da Thumbnail</label>
          <input id="f-thumbnail_url" value="${v('thumbnail_url')}" placeholder="https://...">
        </div>

// ─── TEXT TO HTML ────────────────────────────────────────────
function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<br\s*\/?>/gi, '\n').replace(/<p[^>]*>/gi, '').replace(/<\/p>/gi, '\n\n').replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/\n{3,}/g, '\n\n').trim();
}
function textToHtml(text) {
  if (!text) return '';
  return text
    .split(/\n\s*\n/)
    .map(block => {
      const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length === 0) return '';
      return '<p>' + lines.map(l => escHtml(l)).join('<br>') + '</p>';
    })
    .filter(Boolean)
    .join('\n');
}

// ─── MODAL: SAVE ─────────────────────────────────────────────
async function saveModal() {
  const table = modalTable;
  if (!table) return;
  const get = id => document.getElementById(id);
  const val = id => get(id)?.value ?? '';
  const num = id => parseFloat(val(id)) || 0;
  const bool = id => get(id)?.checked ?? false;

  let payload;
  switch (table) {
    case 'news':
      const raw = val('f-body');
      const imgUrl = val('f-image_url');
      let bodyHtml = textToHtml(raw);
      if (imgUrl) bodyHtml = '<p><img src="' + escHtml(imgUrl) + '" alt="" style="width:100%;max-width:100%;border-radius:6px;margin-bottom:16px"></p>\n' + bodyHtml;
      payload = { title: val('f-title'), cat: val('f-cat'), excerpt: val('f-excerpt'), body: bodyHtml, body_raw: raw, date: val('f-date') || dateStr(), image_url: imgUrl, featured: bool('f-featured') };
      break;
    case 'videos':
      payload = { title: val('f-title'), cat: val('f-cat'), duration: val('f-duration'), video_url: val('f-video_url'), thumbnail_url: val('f-thumbnail_url'), premium: bool('f-premium') };
      break;
    case 'podcasts':
      payload = { ep: num('f-ep'), duration: val('f-duration'), title: val('f-title'), guest: val('f-guest'), audio_url: val('f-audio_url') };
      break;
    case 'auctions':
      payload = { lot: num('f-lot'), total: num('f-total'), horse: val('f-horse'), lineage: val('f-lineage'), price: num('f-price'), status: val('f-status') };
      break;
    case 'rankings':
      payload = { pos: num('f-pos'), pts: num('f-pts'), name: val('f-name'), flag: val('f-flag') };
      break;
    case 'events':
      payload = { day: num('f-day'), mon: val('f-mon'), level: val('f-level'), name: val('f-name'), loc: val('f-loc'), flag: val('f-flag') };
      break;
    case 'horses':
      payload = { name: val('f-name'), rider: val('f-rider'), breed: val('f-breed'), score: num('f-score'), price: val('f-price'), image_url: val('f-image_url') };
      break;
    default: return;
  }

  const saveBtn = $('modal-save');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Salvando...';

  let error;
  if (S.editId) {
    ({ error } = await sb.from(table).update(payload).eq('id', S.editId));
  } else {
    ({ error } = await sb.from(table).insert(payload));
  }

  saveBtn.disabled = false;
  saveBtn.textContent = S.editId ? 'Salvar' : 'Criar';

  if (error) { toast('Erro: ' + error.message, 'var(--red)'); return; }
  toast(S.editId ? 'Atualizado!' : 'Criado!');
  closeModal();
  renderSection(S.section);
}

// ─── DELETE ──────────────────────────────────────────────────
async function confirmDelete(table, id) {
  if (!confirm('Tem certeza que deseja excluir este registro?')) return;
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'var(--red)'); return; }
  toast('Excluído!');
  renderSection(S.section);
}

// ─── SETTINGS ────────────────────────────────────────────────
async function renderSettings(c) {
  const { data: aiData } = await sb.from('site_settings').select('value').eq('key', 'ai_analysis').single();
  const { data: statsData } = await sb.from('site_settings').select('value').eq('key', 'stats').single();
  const ai = aiData?.value || { headline: '', summary: '', tags: [] };
  const stats = statsData?.value || {};

  c.innerHTML = `
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Análise IA</h3>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:24px">
      <div class="form-field">
        <label>Título</label>
        <input id="ai-headline" value="${escHtml(ai.headline)}">
      </div>
      <div class="form-field">
        <label>Resumo</label>
        <textarea id="ai-summary" rows="4">${escHtml(ai.summary)}</textarea>
      </div>
      <div class="form-field">
        <label>Tags (separadas por vírgula)</label>
        <input id="ai-tags" value="${escHtml((ai.tags||[]).join(', '))}">
      </div>
      <button class="btn btn-accent" onclick="saveAIAnalysis()">Salvar Análise IA</button>
    </div>

    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Estatísticas do App</h3>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:24px">
      <div class="form-row">
        <div class="form-field"><label>Cavalos</label><input id="s-horses" value="${escHtml(stats.horses||'')}"></div>
        <div class="form-field"><label>Cavaleiros</label><input id="s-riders" value="${escHtml(stats.riders||'')}"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Eventos</label><input id="s-events" value="${escHtml(stats.events||'')}"></div>
        <div class="form-field"><label>Países</label><input id="s-countries" value="${escHtml(stats.countries||'')}"></div>
      </div>
      <div class="form-field">
        <label>Criadores</label>
        <input id="s-breeders" value="${escHtml(stats.breeders||'')}">
      </div>
      <button class="btn btn-accent" onclick="saveStats()">Salvar Estatísticas</button>
    </div>
  `;
}

async function saveAIAnalysis() {
  const value = {
    headline: $('ai-headline').value,
    summary: $('ai-summary').value,
    tags: $('ai-tags').value.split(',').map(t => t.trim()).filter(Boolean),
  };
  const { error } = await sb.from('site_settings').upsert({ key: 'ai_analysis', value }, { onConflict: 'key' });
  if (error) { toast('Erro: ' + error.message, 'var(--red)'); return; }
  toast('Análise IA salva!');
}

async function saveStats() {
  const value = {
    horses: $('s-horses').value,
    riders: $('s-riders').value,
    events: $('s-events').value,
    countries: $('s-countries').value,
    breeders: $('s-breeders').value,
  };
  const { error } = await sb.from('site_settings').upsert({ key: 'stats', value }, { onConflict: 'key' });
  if (error) { toast('Erro: ' + error.message, 'var(--red)'); return; }
  toast('Estatísticas salvas!');
}
</script>
