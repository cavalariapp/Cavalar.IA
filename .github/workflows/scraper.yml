name: Scraper Calendário

# Scraper de PRODUÇÃO (substitui os testes do N8N, que nunca scrapearam de
# verdade). Roda o parser testado em scraper/ e grava na camada bruta
# (torneios) de forma idempotente por (fonte, id_nativo).
#
# SEGREDOS (Settings → Secrets and variables → Actions):
#   SUPABASE_URL          ex.: https://vetkgrksvbegifotmltv.supabase.co
#   SUPABASE_SERVICE_KEY  a chave service_role (NUNCA no código/frontend)
# Sem esses segredos, qualquer execução com --write aborta sem gravar.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Código da fonte (ex.: FPH)"
        type: string
        default: "FPH"
      write:
        description: "Gravar no Supabase? (false = dry-run, recomendado p/ testar)"
        type: boolean
        default: false
      year:
        description: "Ano (vazio = atual). Use com month p/ navegar via navegador."
        type: string
        default: ""
      month:
        description: "Mês 1-12 (vazio = mês atual via requests, sem navegador)"
        type: string
        default: ""
      detail_id:
        description: "Fase B: parseia provas+docs DESTE ID (navegador). Grava se write=true. Vazio = ignora."
        type: string
        default: ""
      dump:
        description: "Com detail_id: captura o HTML CRU (pra gerar fixture) em vez de parsear/gravar."
        type: boolean
        default: false
      reconcile:
        description: "Reconcilia id_nativo (calendário ao vivo ⟷ torneios legados; TODAS as fontes ativas; mês atual). Grava se write=true."
        type: boolean
        default: false
      completar:
        description: "Completa torneios incompletos: detalhe (provas+dia+docs) + resultados (lote 40). Piso = completar_desde (default 2024). Grava se write=true."
        type: boolean
        default: false
      completar_desde:
        description: "Piso de data p/ --completar (ex.: 2013-01-01 p/ backfill). Vazio = 2024-01-01."
        type: string
        default: ""
      backfill:
        description: "Backfill do CALENDÁRIO de um ANO inteiro (12 meses). Use com source=FPH + year=YYYY. Rode 1x por ano (2013..hoje). Grava se write=true."
        type: boolean
        default: false
      fph_walk:
        description: "BACKFILL HISTÓRICO FPH: varre Resultados.aspx?ID=N (auto-contido: evento+data+prova+ALTURA+resultados). Tipo A via requests; Tipo B (categorias) via navegador+merge. Use walk_* p/ janela. Grava se write=true."
        type: boolean
        default: false
      walk_id_min:
        description: "fph-walk: 1º ID a varrer (default 1). Rode em BLOCOS (ex.: 1, 3500, 7000, 10500) — ~6h/bloco."
        type: string
        default: ""
      walk_id_max:
        description: "fph-walk: último ID (default 14200). Bloco sugerido ~3500 IDs."
        type: string
        default: ""
      walk_desde:
        description: "fph-walk: piso de data (default 2013-01-01). Só grava provas a partir desta data."
        type: string
        default: ""
      walk_ate:
        description: "fph-walk: teto de data EXCLUSIVO (default 2024-01-01 — o recente já vem do calendário). Use 2026-07-01 p/ incluir tudo."
        type: string
        default: ""
      recurar:
        description: "RE-CURA resultados existentes: relê cada prova e REALINHA metadata (altura/nome) + resultados (sana dessincronia por renumeração de id_origem no MacroNetwork). Use recurar_desde/_ate p/ janela. Grava se write=true."
        type: boolean
        default: false
      recurar_desde:
        description: "recurar: piso de data dos torneios (default 2024-01-01)."
        type: string
        default: ""
      recurar_ate:
        description: "recurar: teto de data dos torneios (default amanhã)."
        type: string
        default: ""
      proximos:
        description: "Frescor dos próximos torneios [hoje-7..+60]: docs (programa/adendo/horário) + ordem de entrada + resultados. Grava se write=true."
        type: boolean
        default: false
      estruturar:
        description: "Estrutura docs (programa/horário) com IA: PDF→texto→Claude→conteudo_estruturado (lote 15)."
        type: boolean
        default: false
      noticias:
        description: "Coleta notícias (Google News RSS pt-BR) e insere as novas na tabela news. Grava se write=true."
        type: boolean
        default: false
      shb:
        description: "SHB: resultado por prova (shb.app.br) → torneios+provas+resultados. Grava se write=true."
        type: boolean
        default: false
      fgee:
        description: "FGEE: resultado por prova via LiveHorse (PDF→Claude). Lote CAVALARIA_FGEE_MAX. Grava se write=true."
        type: boolean
        default: false
      abcch:
        description: "ABCCH: espelha o studbook genealógico (pai/mãe, ~46k animais) na tabela genealogia. Grava se write=true."
        type: boolean
        default: false
      spotify_show:
        description: "Spotify: URL de um SHOW pra importar TODOS os episódios pra media (podcast). Grava se write=true."
        type: string
        default: ""
      spotify_programa:
        description: "Spotify: nome do programa/aba (default: nome do show)."
        type: string
        default: ""
  schedule:
    # ~06:00 e ~18:00 BRT (UTC-3). GitHub agenda em UTC e pode atrasar.
    - cron: "0 9,21 * * *"

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # Playwright ainda não tem wheel p/ 3.14

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Testes (gate)
        # pytest descobre todos os scraper/tests/test_*.py E falha o build no
        # 1º teste vermelho (os self-runners __main__ sempre saíam 0 = não-gate).
        run: python -m pytest scraper/tests/ -q

      - name: Rodar scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          IN_SOURCE: ${{ inputs.source }}
          IN_WRITE: ${{ inputs.write }}
          IN_YEAR: ${{ inputs.year }}
          IN_MONTH: ${{ inputs.month }}
          IN_DETAIL: ${{ inputs.detail_id }}
          IN_DUMP: ${{ inputs.dump }}
          IN_RECONCILE: ${{ inputs.reconcile }}
          IN_COMPLETAR: ${{ inputs.completar }}
          IN_DESDE: ${{ inputs.completar_desde }}
          IN_BACKFILL: ${{ inputs.backfill }}
          IN_FPH_WALK: ${{ inputs.fph_walk }}
          IN_RECURAR: ${{ inputs.recurar }}
          IN_RECURAR_DESDE: ${{ inputs.recurar_desde }}
          IN_RECURAR_ATE: ${{ inputs.recurar_ate }}
          IN_WALK_ID_MIN: ${{ inputs.walk_id_min }}
          IN_WALK_ID_MAX: ${{ inputs.walk_id_max }}
          IN_WALK_DESDE: ${{ inputs.walk_desde }}
          IN_WALK_ATE: ${{ inputs.walk_ate }}
          IN_PROXIMOS: ${{ inputs.proximos }}
          IN_ESTRUTURAR: ${{ inputs.estruturar }}
          IN_NOTICIAS: ${{ inputs.noticias }}
          IN_SHB: ${{ inputs.shb }}
          IN_FGEE: ${{ inputs.fgee }}
          IN_ABCCH: ${{ inputs.abcch }}
          IN_SPOTIFY_SHOW: ${{ inputs.spotify_show }}
          IN_SPOTIFY_PROGRAMA: ${{ inputs.spotify_programa }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # AUTOMAÇÃO diária: 1) reconcilia id_nativo do mês atual (requests,
            # idempotente) → 2) FRESCOR dos próximos torneios (detalhe: provas+dia+
            # docs/programa/adendo/horário + ordem de entrada + resultados).
            # NÃO roda --current --write aqui (evita duplicar torneios; a inserção
            # de eventos NOVOS fica manual até o modelo canônico de dedup #80-83).
            python -m scraper.main --reconcile --write || echo "reconcile falhou, seguindo"
            python -m scraper.main --proximos --write
            python -m scraper.main --estruturar || echo "estruturar pulado (falta ANTHROPIC_API_KEY?)"
            python -m scraper.main --noticias --write || echo "noticias pulado"
            python -m scraper.main --shb --write || echo "shb pulado"
            python -m scraper.main --fgee --write || echo "fgee pulado"
            python -m scraper.main --refresh-genetica || echo "refresh-genetica pulado"
          elif [ "${IN_RECONCILE:-false}" = "true" ]; then
            # reconcilia id_nativo de TODAS as fontes ativas (mês atual, requests).
            # Backfilla a chave (fonte,id_nativo) nos torneios legados → destrava
            # docs/ordens e o --write do calendário sem duplicar. Dry-run se write=false.
            ARGS="--reconcile"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_BACKFILL:-false}" = "true" ]; then
            # backfill do CALENDÁRIO de um ANO inteiro (12 meses) — popular histórico.
            ARGS="--backfill --source ${IN_SOURCE:-FPH}"
            [ -n "${IN_YEAR:-}" ] && ARGS="$ARGS --year ${IN_YEAR}"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_FPH_WALK:-false}" = "true" ]; then
            # BACKFILL HISTÓRICO: varre Resultados.aspx?ID=N (auto-contido). Janela
            # por env (default IDs 1..14200, datas 2013-01-01..2024-01-01). Rode em
            # BLOCOS de ~3500 IDs (cada bloco ~6h no Tipo B/navegador).
            [ -n "${IN_WALK_ID_MIN:-}" ] && export CAVALARIA_WALK_ID_MIN="${IN_WALK_ID_MIN}"
            [ -n "${IN_WALK_ID_MAX:-}" ] && export CAVALARIA_WALK_ID_MAX="${IN_WALK_ID_MAX}"
            [ -n "${IN_WALK_DESDE:-}" ] && export CAVALARIA_WALK_DESDE="${IN_WALK_DESDE}"
            [ -n "${IN_WALK_ATE:-}" ]   && export CAVALARIA_WALK_ATE="${IN_WALK_ATE}"
            ARGS="--fph-walk"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS  (IDs ${CAVALARIA_WALK_ID_MIN:-1}..${CAVALARIA_WALK_ID_MAX:-14200}, datas [${CAVALARIA_WALK_DESDE:-2013-01-01}, ${CAVALARIA_WALK_ATE:-2024-01-01}))"
            python -m scraper.main $ARGS
          elif [ "${IN_RECURAR:-false}" = "true" ]; then
            # re-cura resultados existentes: realinha metadata (altura) + resultados
            # ao retrato atual da página (sana renumeração de id_origem). Lote por
            # CAVALARIA_MAX; janela por CAVALARIA_RECURAR_DESDE/_ATE.
            [ -n "${IN_RECURAR_DESDE:-}" ] && export CAVALARIA_RECURAR_DESDE="${IN_RECURAR_DESDE}"
            [ -n "${IN_RECURAR_ATE:-}" ]   && export CAVALARIA_RECURAR_ATE="${IN_RECURAR_ATE}"
            ARGS="--recurar"
            [ -n "${IN_SOURCE:-}" ] && ARGS="$ARGS --source ${IN_SOURCE}"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_COMPLETAR:-false}" = "true" ]; then
            # completa torneios incompletos (detalhe+provas+dia+docs+resultados) em lote
            # (CAVALARIA_MAX, default 40). Piso de data = completar_desde (default 2024).
            [ -n "${IN_DESDE:-}" ] && export CAVALARIA_DESDE="${IN_DESDE}"
            ARGS="--completar"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS  (desde=${CAVALARIA_DESDE:-2024-01-01})"
            python -m scraper.main $ARGS
          elif [ "${IN_PROXIMOS:-false}" = "true" ]; then
            # frescor dos próximos torneios (docs + ordem + resultados) sob demanda.
            ARGS="--proximos"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_ESTRUTURAR:-false}" = "true" ]; then
            python -m scraper.main --estruturar
          elif [ "${IN_NOTICIAS:-false}" = "true" ]; then
            ARGS="--noticias"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_SHB:-false}" = "true" ]; then
            ARGS="--shb"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_FGEE:-false}" = "true" ]; then
            ARGS="--fgee"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ "${IN_ABCCH:-false}" = "true" ]; then
            ARGS="--abcch"
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          elif [ -n "${IN_SPOTIFY_SHOW:-}" ]; then
            ARGS=(--spotify-show "${IN_SPOTIFY_SHOW}")
            [ -n "${IN_SPOTIFY_PROGRAMA:-}" ] && ARGS+=(--programa "${IN_SPOTIFY_PROGRAMA}")
            [ "${IN_WRITE:-false}" = "true" ] && ARGS+=(--write)
            python -m scraper.main "${ARGS[@]}"
          elif [ -n "${IN_DETAIL:-}" ]; then
            if [ "${IN_DUMP:-false}" = "true" ]; then
              # captura o HTML CRU do detalhe (gera fixture). Não grava.
              python -m scraper.main --source "${IN_SOURCE:-FPH}" --dump-detail "${IN_DETAIL}"
            else
              # parseia provas+docs do ID; grava (upsert FK-safe) se write=true.
              ARGS="--source ${IN_SOURCE:-FPH} --detail ${IN_DETAIL}"
              [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
              echo "args: $ARGS"
              python -m scraper.main $ARGS
            fi
          else
            ARGS="--source ${IN_SOURCE:-FPH}"
            if [ -n "${IN_MONTH:-}" ]; then
              ARGS="$ARGS --month ${IN_MONTH}"
              [ -n "${IN_YEAR:-}" ] && ARGS="$ARGS --year ${IN_YEAR}"
            else
              ARGS="$ARGS --current"
              [ -n "${IN_YEAR:-}" ] && ARGS="$ARGS --year ${IN_YEAR}"
            fi
            [ "${IN_WRITE:-false}" = "true" ] && ARGS="$ARGS --write"
            echo "args: $ARGS"
            python -m scraper.main $ARGS
          fi
